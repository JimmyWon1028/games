<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>太空大战</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #282c34;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #61dafb;
        }
        #gameCanvas {
            border: 8px solid #61dafb;
            background-color: #000;
            box-shadow: 0 0 20px rgba(97, 220, 251, 0.5);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
        }
        #scoreBoard {
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        #startButton {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #startButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>太空大战</h1>
    <div id="scoreBoard">得分: <span id="currentScore">0</span> | 生命: <span id="lives">3</span></div>
    <canvas id="gameCanvas" width="480" height="600"></canvas>
    <button id="startButton">开始游戏</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('currentScore');
        const livesDisplay = document.getElementById('lives');
        const startButton = document.getElementById('startButton');

        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 30;
        const BULLET_WIDTH = 3;
        const BULLET_HEIGHT = 10;
        const ENEMY_SIZE = 25;
        const STAR_COUNT = 50;

        let player = { x: canvas.width / 2, y: canvas.height - 50 };
        let bullets = [];
        let enemies = [];
        let stars = [];
        let currentScore = 0;
        let lives = 3;
        let isGameRunning = false;
        let gameInterval = null;
        let keys = { left: false, right: false, shoot: false };
        let lastShotTime = 0;
        let enemySpawnRate = 100;
        let audioCtx = null;
        let bgmPlaying = false;
        let bgmNoteIdx = 0;

        const BGM_NOTES = [
            { f: 262, d: 0.2 }, { f: 294, d: 0.2 }, { f: 330, d: 0.2 }, { f: 262, d: 0.2 },
            { f: 330, d: 0.2 }, { f: 294, d: 0.2 }, { f: 262, d: 0.2 }, { f: 220, d: 0.2 },
            { f: 262, d: 0.2 }, { f: 330, d: 0.2 }, { f: 392, d: 0.2 }, { f: 330, d: 0.2 },
            { f: 262, d: 0.2 }, { f: 220, d: 0.2 }, { f: 262, d: 0.2 }, { f: 196, d: 0.2 }
        ];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
                osc.type = 'square';
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'explode') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'hit') {
                osc.frequency.setValueAtTime(400, now);
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'gameover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'start') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        function playBGMTone() {
            if (!bgmPlaying || !isGameRunning) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const note = BGM_NOTES[bgmNoteIdx];
            osc.type = 'square';
            osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + note.d);
            osc.start();
            osc.stop(audioCtx.currentTime + note.d);

            bgmNoteIdx = (bgmNoteIdx + 1) % BGM_NOTES.length;
            setTimeout(playBGMTone, note.d * 1000);
        }

        function startBGM() {
            bgmPlaying = true;
            bgmNoteIdx = 0;
            setTimeout(playBGMTone, 100);
        }

        function stopBGM() {
            bgmPlaying = false;
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: 0.5 + Math.random() * 2,
                    size: 1 + Math.random() * 2
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function moveStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function drawPlayer() {
            ctx.fillStyle = '#61dafb';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - PLAYER_HEIGHT / 2);
            ctx.lineTo(player.x - PLAYER_WIDTH / 2, player.y + PLAYER_HEIGHT / 2);
            ctx.lineTo(player.x + PLAYER_WIDTH / 2, player.y + PLAYER_HEIGHT / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#0af';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - PLAYER_WIDTH / 4, player.y + PLAYER_HEIGHT / 2);
            ctx.lineTo(player.x + PLAYER_WIDTH / 4, player.y + PLAYER_HEIGHT / 2);
            ctx.closePath();
            ctx.fill();
        }

        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - BULLET_WIDTH / 2, bullet.y, BULLET_WIDTH, BULLET_HEIGHT);
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_SIZE, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.fillRect(enemy.x - 8, enemy.y - 5, 4, 4);
                ctx.fillRect(enemy.x + 4, enemy.y - 5, 4, 4);
            });
        }

        function spawnEnemy() {
            if (Math.random() * 100 < enemySpawnRate / 60) {
                const colors = ['#f44', '#f84', '#fc4', '#fff'];
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -ENEMY_SIZE,
                    speed: 1 + Math.random() * 2,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function initializeGame() {
            playSound('start');
            startBGM();
            initAudio();
            currentScore = 0;
            lives = 3;
            scoreDisplay.textContent = 0;
            livesDisplay.textContent = lives;
            player.x = canvas.width / 2;
            bullets = [];
            enemies = [];
            enemySpawnRate = 100;
            initStars();

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            isGameRunning = true;
            drawGame();
        }

        function shoot() {
            const now = Date.now();
            if (now - lastShotTime > 250) {
                bullets.push({ x: player.x, y: player.y - PLAYER_HEIGHT / 2 });
                lastShotTime = now;
                playSound('shoot');
            }
        }

        function update() {
            if (keys.left) player.x = Math.max(PLAYER_WIDTH / 2, player.x - 6);
            if (keys.right) player.x = Math.min(canvas.width - PLAYER_WIDTH / 2, player.x + 6);
            if (keys.shoot) shoot();

            moveStars();

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 8;
                if (bullets[i].y < -BULLET_HEIGHT) {
                    bullets.splice(i, 1);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                if (enemies[i].y > canvas.height + ENEMY_SIZE) {
                    enemies.splice(i, 1);
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (Math.abs(enemies[i].x - bullets[j].x) < ENEMY_SIZE &&
                        Math.abs(enemies[i].y - bullets[j].y) < ENEMY_SIZE) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        currentScore += 50;
                        scoreDisplay.textContent = currentScore;
                        playSound('explode');
                        enemySpawnRate += 2;
                        break;
                    }
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (Math.abs(enemies[i].x - player.x) < ENEMY_SIZE + PLAYER_WIDTH / 2 &&
                    Math.abs(enemies[i].y - player.y) < ENEMY_SIZE + PLAYER_HEIGHT / 2) {
                    enemies.splice(i, 1);
                    lives--;
                    livesDisplay.textContent = lives;
                    playSound('hit');
                    if (lives <= 0) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        function drawGame() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars();
            drawEnemies();
            drawBullets();
            drawPlayer();
        }

        function gameLoop() {
            if (!isGameRunning) return;
            spawnEnemy();
            update();
            drawGame();
        }

        function gameOver() {
            isGameRunning = false;
            stopBGM();
            playSound('gameover');
            clearInterval(gameInterval);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText(`你得了 ${currentScore} 分`, canvas.width / 2, canvas.height / 2 + 40);
            startButton.textContent = "再玩一次";
        }

        document.addEventListener('keydown', (event) => {
            if (!isGameRunning) return;
            if (event.key === 'ArrowLeft') keys.left = true;
            else if (event.key === 'ArrowRight') keys.right = true;
            else if (event.key === ' ' || event.key === 'ArrowUp') keys.shoot = true;
            event.preventDefault();
        });

        document.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowLeft') keys.left = false;
            else if (event.key === 'ArrowRight') keys.right = false;
            else if (event.key === ' ' || event.key === 'ArrowUp') keys.shoot = false;
        });

        startButton.addEventListener('click', () => {
            initAudio();
            if (!isGameRunning) {
                if (gameInterval) clearInterval(gameInterval);
                initializeGame();
                gameInterval = setInterval(gameLoop, 16);
            }
        });

        window.onload = () => {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#61dafb';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('点击开始按钮开始游戏', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '14px Arial';
            ctx.fillText('← → 移动 | 空格/↑ 射击', canvas.width / 2, canvas.height / 2 + 20);
        };
    </script>
</body>
</html>
