<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>炸弹人</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #282c34;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #61dafb;
        }
        #gameCanvas {
            border: 8px solid #61dafb;
            background-color: #2d5a27;
            box-shadow: 0 0 20px rgba(97, 220, 251, 0.5);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
        }
        #scoreBoard {
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        #startButton {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>炸弹人</h1>
    <div id="scoreBoard">得分: <span id="currentScore">0</span> | 生命: <span id="lives">1</span></div>
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    <button id="startButton">开始游戏</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('currentScore');
        const livesDisplay = document.getElementById('lives');
        const startButton = document.getElementById('startButton');

        const TILE_SIZE = 32;
        const ROWS = 15;
        const COLS = 15;
        const PLAYER_SIZE = 24;
        const BOMB_DELAY = 2000;
        const EXPLODE_DELAY = 500;

        let player = { x: 1, y: 1, dx: 0, dy: 0 };
        let bombs = [];
        let explosions = [];
        let enemies = [];
        let walls = [];
        let currentScore = 0;
        let isGameRunning = false;
        let gameInterval = null;
        let keys = { up: false, down: false, left: false, right: false };
        let audioCtx = null;

        const BGM_NOTES = [
            { f: 220, d: 0.15 }, { f: 262, d: 0.15 }, { f: 294, d: 0.15 }, { f: 262, d: 0.15 },
            { f: 220, d: 0.15 }, { f: 196, d: 0.15 }, { f: 220, d: 0.15 }, { f: 175, d: 0.15 }
        ];
        let bgmPlaying = false;
        let bgmNoteIdx = 0;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'place') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'explode') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'start') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        function playBGMTone() {
            if (!bgmPlaying || !isGameRunning) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const note = BGM_NOTES[bgmNoteIdx];
            osc.type = 'square';
            osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + note.d);
            osc.start();
            osc.stop(audioCtx.currentTime + note.d);
            bgmNoteIdx = (bgmNoteIdx + 1) % BGM_NOTES.length;
            setTimeout(playBGMTone, note.d * 1000);
        }

        function startBGM() {
            bgmPlaying = true;
            bgmNoteIdx = 0;
            setTimeout(playBGMTone, 100);
        }

        function stopBGM() {
            bgmPlaying = false;
        }

        function initWalls() {
            walls = [];
            for (let y = 0; y < ROWS; y++) {
                walls[y] = [];
                for (let x = 0; x < COLS; x++) {
                    if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1 ||
                        (x % 2 === 0 && y % 2 === 0)) {
                        walls[y][x] = 1;
                    } else if (Math.random() < 0.3 && (x > 2 || y > 2)) {
                        walls[y][x] = 2;
                    } else {
                        walls[y][x] = 0;
                    }
                }
            }
            walls[1][1] = 0;
            walls[1][2] = 0;
            walls[2][1] = 0;
        }

        function initEnemies() {
            enemies = [];
            for (let i = 0; i < 5; i++) {
                let ex, ey;
                do {
                    ex = Math.floor(Math.random() * COLS);
                    ey = Math.floor(Math.random() * ROWS);
                } while (walls[ey][ex] !== 0 || (ex < 4 && ey < 4));
                enemies.push({ x: ex, y: ey, dir: Math.floor(Math.random() * 4) });
            }
        }

        function drawMap() {
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const px = x * TILE_SIZE;
                    const py = y * TILE_SIZE;

                    if (walls[y][x] === 1) {
                        ctx.fillStyle = '#444';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    } else if (walls[y][x] === 2) {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            }
        }

        function drawPlayer() {
            const px = player.x * TILE_SIZE + TILE_SIZE / 2;
            const py = player.y * TILE_SIZE + TILE_SIZE / 2;

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(px, py, PLAYER_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(px, py, PLAYER_SIZE / 2 - 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBombs() {
            bombs.forEach(bomb => {
                const px = bomb.x * TILE_SIZE + TILE_SIZE / 2;
                const py = bomb.y * TILE_SIZE + TILE_SIZE / 2;

                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(px, py, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(px + 4, py - 4, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawExplosions() {
            explosions.forEach(exp => {
                exp.tiles.forEach(tile => {
                    const px = tile.x * TILE_SIZE;
                    const py = tile.y * TILE_SIZE;
                    ctx.fillStyle = 'rgba(255, 100, 0, 0.8)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                });
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                const px = enemy.x * TILE_SIZE + TILE_SIZE / 2;
                const py = enemy.y * TILE_SIZE + TILE_SIZE / 2;

                ctx.fillStyle = '#f44';
                ctx.beginPath();
                ctx.arc(px, py, PLAYER_SIZE / 2 - 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.fillRect(px - 5, py - 3, 4, 4);
                ctx.fillRect(px + 1, py - 3, 4, 4);
            });
        }

        function placeBomb() {
            const bomb = {
                x: player.x,
                y: player.y,
                time: Date.now()
            };
            bombs.push(bomb);
            playSound('place');
            playSound('explode');

            setTimeout(() => explodeBomb(bomb), BOMB_DELAY);
        }

        function explodeBomb(bomb) {
            const tiles = [{ x: bomb.x, y: bomb.y }];
            const directions = [[0, -1], [0, 1], [-1, 0], [1, 0]];

            for (let i = 1; i <= 2; i++) {
                for (let [dx, dy] of directions) {
                    const nx = bomb.x + dx * i;
                    const ny = bomb.y + dy * i;

                    if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS) {
                        if (walls[ny][nx] === 1) break;
                        tiles.push({ x: nx, y: ny });
                        if (walls[ny][nx] === 2) {
                            walls[ny][nx] = 0;
                            currentScore += 50;
                            scoreDisplay.textContent = currentScore;
                            break;
                        }
                    }
                }
            }

            explosions.push({ tiles, time: Date.now() });

            const idx = bombs.indexOf(bomb);
            if (idx > -1) bombs.splice(idx, 1);

            checkExplosionHit(tiles);

            setTimeout(() => {
                const expIdx = explosions.findIndex(e => e.time === explosions[0]?.time);
                if (expIdx > -1) explosions.splice(expIdx, 1);
            }, EXPLODE_DELAY);
        }

        function checkExplosionHit(tiles) {
            enemies.forEach((enemy, i) => {
                tiles.forEach(tile => {
                    if (enemy.x === tile.x && enemy.y === tile.y) {
                        enemies.splice(i, 1);
                        currentScore += 100;
                        scoreDisplay.textContent = currentScore;
                    }
                });
            });

            tiles.forEach(tile => {
                if (player.x === tile.x && player.y === tile.y) {
                    gameOver();
                }
            });
        }

        function movePlayer() {
            let nx = player.x;
            let ny = player.y;

            if (keys.up) ny--;
            else if (keys.down) ny++;
            else if (keys.left) nx--;
            else if (keys.right) nx++;

            if (walls[ny]?.[nx] === 0) {
                player.x = nx;
                player.y = ny;
            }
        }

        function moveEnemies() {
            enemies.forEach(enemy => {
                const directions = [[0, -1], [0, 1], [-1, 0], [1, 0]];
                let [dx, dy] = directions[enemy.dir];

                let nx = enemy.x + dx;
                let ny = enemy.y + dy;

                if (ny < 0 || ny >= ROWS || nx < 0 || nx >= COLS || walls[ny][nx] !== 0) {
                    enemy.dir = Math.floor(Math.random() * 4);
                } else {
                    enemy.x = nx;
                    enemy.y = ny;
                }

                if (enemy.x === player.x && enemy.y === player.y) {
                    gameOver();
                }
            });
        }

        function initializeGame() {
            playSound('start');
            startBGM();
            initAudio();
            currentScore = 0;
            scoreDisplay.textContent = 0;
            livesDisplay.textContent = 1;
            player = { x: 1, y: 1 };
            bombs = [];
            explosions = [];
            initWalls();
            initEnemies();

            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            isGameRunning = true;
            drawGame();
        }

        function drawGame() {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawMap();
            drawBombs();
            drawExplosions();
            drawEnemies();
            drawPlayer();
        }

        function gameLoop() {
            if (!isGameRunning) return;
            movePlayer();
            moveEnemies();
            drawGame();
        }

        function gameOver() {
            isGameRunning = false;
            stopBGM();
            playSound('gameover');
            clearInterval(gameInterval);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText(`得分: ${currentScore}`, canvas.width / 2, canvas.height / 2 + 40);
            startButton.textContent = "再玩一次";
        }

        document.addEventListener('keydown', (event) => {
            if (!isGameRunning) return;
            if (event.key === 'ArrowUp' || event.key === 'w') keys.up = true;
            else if (event.key === 'ArrowDown' || event.key === 's') keys.down = true;
            else if (event.key === 'ArrowLeft' || event.key === 'a') keys.left = true;
            else if (event.key === 'ArrowRight' || event.key === 'd') keys.right = true;
            else if (event.key === ' ') placeBomb();
            event.preventDefault();
        });

        document.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowUp' || event.key === 'w') keys.up = false;
            else if (event.key === 'ArrowDown' || event.key === 's') keys.down = false;
            else if (event.key === 'ArrowLeft' || event.key === 'a') keys.left = false;
            else if (event.key === 'ArrowRight' || event.key === 'd') keys.right = false;
        });

        startButton.addEventListener('click', () => {
            initAudio();
            if (!isGameRunning) {
                if (gameInterval) clearInterval(gameInterval);
                initializeGame();
                gameInterval = setInterval(gameLoop, 200);
            }
        });

        window.onload = () => {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('点击开始按钮开始游戏', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '14px Arial';
            ctx.fillText('WASD 移动 | 空格 放炸弹', canvas.width / 2, canvas.height / 2 + 20);
        };
    </script>
</body>
</html>
