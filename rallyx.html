<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>迷魂車 RALLY-X</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a12;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:100vh;
  font-family:'Courier New',monospace;overflow:hidden;
}
.game-box{
  background:#16162a;padding:14px 18px 12px;border-radius:10px;
  border:2px solid #333;box-shadow:0 0 40px rgba(0,0,0,0.9);
}
.top-bar{
  display:flex;justify-content:space-between;width:100%;
  color:#ffcc00;font-size:13px;font-weight:bold;margin-bottom:4px;
  font-family:'Courier New',monospace;
}
#msg{
  margin-top:6px;font-size:11px;color:#666;
  font-family:'Courier New',monospace;text-align:center;height:14px;
}
</style>
</head>
<body>
<div class="game-box">
  <div class="top-bar">
    <span>1UP <span id="score">00000</span></span>
    <span>HIGH <span id="hiscore">00000</span></span>
    <span>LEVEL <span id="level">1</span></span>
  </div>
  <canvas id="game" width="600" height="440"></canvas>
  <div id="msg">← → ↑ ↓ 移動 · SPACE 放屁 · 收集10面旗子過關</div>
</div>

<script>
const C=document.getElementById('game'),X=C.getContext('2d');
const el={s:document.getElementById('score'),h:document.getElementById('hiscore'),
           l:document.getElementById('level'),m:document.getElementById('msg')};

let ac;
function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function pt(f,d,t,v,de){try{ia();const o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,ac.currentTime);g.gain.setValueAtTime(v||.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(de||ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sfx1(){pt(880,.08,'square',.06);setTimeout(()=>pt(1100,.1,'square',.06),60)}
function sfx2(){pt(300,.3,'sawtooth',.09);setTimeout(()=>pt(200,.4,'sawtooth',.07),200);setTimeout(()=>pt(120,.5,'sawtooth',.06),400)}
function sfx3(){pt(400,.1,'square',.05);setTimeout(()=>pt(550,.1,'square',.05),80);setTimeout(()=>pt(700,.15,'square',.05),160)}

let btm=null,bi=0,bgmGain=null;
const BM=[
  [440,195],[440,199],[370,199],[330,199],[440,397],[523,397],[440,199],[440,199],
  [370,199],[330,199],[440,397],[370,397],[440,199],[440,199],[370,199],[330,199],
  [440,199],[523,199],[587,199],[622,199],[659,199],[622,99],[659,99],[622,99],
  [659,99],[622,99],[659,99],[659,397],[659,99],[587,99],[554,99],[494,99],
  [440,199],[440,199],[370,199],[330,199],[440,397],[523,397],[440,199],[440,199],
  [370,199],[330,199],[440,397],[370,397],[440,199],[440,199],[370,199],[330,199],
  [440,199],[523,199],[587,199],[622,199],[880,199],[659,99],[587,99],[523,199],
  [440,199],[392,199],[415,199],[440,397],[587,58],[659,339],[554,199],[659,199],
  [740,199],[554,199],[659,199],[740,199],[554,199],[494,199],[440,199],[370,199],
  [440,199],[370,199],[440,199],[494,199],[440,199],[554,199],[494,199],[440,199],
];
const BB=[
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[82,199],
  [82,199],[165,199],[165,199],[165,199],[82,199],[92,199],[104,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[73,199],
  [147,199],[82,199],[165,199],[110,199],[220,199],[220,397],[110,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,199],[220,199],[220,199],[110,199],
  [110,199],[220,199],[220,199],[110,199],[110,220],[73,199],[73,199],[110,199],
];
function sB(){try{ia();if(btm)return;bgmGain=ac.createGain();bgmGain.gain.value=.35;bgmGain.connect(ac.destination);bi=0;bS()}catch(e){}}
function bS(){try{ia();const i=bi%BM.length;const m=BM[i],b=BB[i];if(m[0])pt(m[0],m[1]/1000,'square',.12,bgmGain);if(b[0])pt(b[0],b[1]/1000,'triangle',.15,bgmGain);bi++;btm=setTimeout(bS,m[1])}catch(e){}}
function xB(){if(btm){clearTimeout(btm);btm=null}if(bgmGain){try{bgmGain.gain.linearRampToValueAtTime(0,ac.currentTime+.15)}catch(e){};setTimeout(()=>{try{bgmGain.disconnect()}catch(e){};bgmGain=null},200)}}

const CS=16;
const VW=432,VH=432;
const GW=48,GH=36;

const M=new Uint8Array(GW*GH);
(function(){
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    M[y*GW+x]=(x===0||x===GW-1||y===0||y===GH-1)?1:0;
  }
  // Structured wall pattern
  for(let y=1;y<GH-1;y++){
    const blockY=Math.floor((y-1)/4);
    for(let x=1;x<GW-1;x++){
      const blockX=Math.floor((x-1)/4);
      const ox=(x-1)%4,oy=(y-1)%4;
      if(blockX%2===0&&blockY%2===0){
        if(ox===0||oy===0||(ox===3&&blockX%2===0)||(oy===3&&blockY%2===0)){
          if(Math.random()<0.7)M[y*GW+x]=1;
        }
      } else {
        if(Math.random()<0.3)M[y*GW+x]=1;
      }
    }
  }
  // Clear start area
  for(let y=1;y<5;y++)for(let x=1;x<5;x++)M[y*GW+x]=0;
  // Carve random passages
  for(let i=0;i<30;i++){
    const x=3+Math.floor(Math.random()*42),y=3+Math.floor(Math.random()*30);
    const d=Math.random()<0.5?0:1;
    if(d===0&&x<GW-2){M[y*GW+x]=0;M[y*GW+x+1]=0}
    if(d===1&&y<GH-2){M[y*GW+x]=0;M[(y+1)*GW+x]=0}
  }
  // Ensure connectivity: remove random walls
  for(let i=0;i<15;i++){
    const x=2+Math.floor(Math.random()*44),y=2+Math.floor(Math.random()*32);
    if(M[y*GW+x]===1){
      const n=(M[(y-1)*GW+x]===0?1:0)+(M[(y+1)*GW+x]===0?1:0)+(M[y*GW+x-1]===0?1:0)+(M[y*GW+x+1]===0?1:0);
      if(n>=2)M[y*GW+x]=0;
    }
  }
  // Extra openings near center
  for(let i=0;i<10;i++){
    const x=12+Math.floor(Math.random()*24),y=8+Math.floor(Math.random()*20);
    if(M[y*GW+x]===1&&Math.random()<0.4)M[y*GW+x]=0;
  }
})();

let hi=parseInt(localStorage.getItem('rx'))||0;
el.h.textContent=String(hi).padStart(5,'0');

let gs={};
let dir=null;

function init(){
  gs={
    score:0,fuel:200,mf:200,
    gx:2,gy:2,dx:1,dy:0,
    clock:0,delay:0,speed:5,
    lives:3,lvl:1,
    flags:[],fc:0,
    rocks:[],
    enemies:[],
    smoke:[],
    alive:true,run:false,end:false,
    flagsCollected:0,
  };
  gs.flags=placeThings(true);
  gs.rocks=placeThings(false);
  gs.enemies=spawnEnemies();
  el.s.textContent='00000';
  el.l.textContent=gs.lvl;
  el.m.textContent='← → ↑ ↓ 移動 · SPACE 放屁 · 收集10面旗子過關';
}

function placeThings(isFlag){
  const items=[],pts=[];
  for(let y=1;y<GH-1;y++)for(let x=1;x<GW-1;x++){
    if(M[y*GW+x]===0&&!(x<5&&y<5))pts.push({x,y});
  }
  for(let i=pts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pts[i],pts[j]]=[pts[j],pts[i]]}
  const n=isFlag?10:Math.floor(Math.random()*6)+3;
  for(let i=0;i<n&&i<pts.length;i++){
    if(isFlag){
      items.push({x:pts[i].x*CS+CS/2,y:pts[i].y*CS+CS/2,got:false,sp:i===0});
    }else if(Math.random()<0.5){
      items.push({x:pts[i].x*CS+CS/2,y:pts[i].y*CS+CS/2});
    }
  }
  return items;
}

function spawnEnemies(){
  const n=Math.min(1+Math.floor((gs.lvl-1)/2),6);
  const sp=[[GW-3,3],[3,GH-3],[GW-3,GH-3],[Math.floor(GW/2),3],[3,Math.floor(GH/2)],[GW-3,Math.floor(GH/2)]];
  const e=[];
  for(let i=0;i<n;i++){
    const s=sp[i%sp.length];
    e.push({x:s[0]*CS+CS/2,y:s[1]*CS+CS/2,dx:0,dy:1,st:0,cd:0,sp:7});
  }
  return e;
}

function can(gx,gy){return gx>=0&&gx<GW&&gy>=0&&gy<GH&&M[gy*GW+gx]===0}

function tick(){
  if(!gs.run||!gs.alive)return;
  gs.clock++;

  // Read input
  if(dir){
    const tg=gs.gx+dir[0],tg2=gs.gy+dir[1];
    if(can(tg,tg2)){gs.dx=dir[0];gs.dy=dir[1]}
  }

  // Auto-move
  if(gs.delay<=0){
    const nx=gs.gx+gs.dx,ny=gs.gy+gs.dy;
    if(can(nx,ny)){
      gs.gx=nx;gs.gy=ny;
      gs.delay=gs.speed;
      gs.fuel=Math.max(0,gs.fuel-0.3);
      for(const r of gs.rocks){
        if(gs.gx===(r.x/CS|0)&&gs.gy===(r.y/CS|0)){gs.alive=false;crash();return}
      }
    }
  }else gs.delay--;

  // Check flags
  const cx=gs.gx*CS+CS/2,cy=gs.gy*CS+CS/2;
  for(const f of gs.flags){
    if(f.got)continue;
    if(Math.abs(cx-f.x)<CS/2&&Math.abs(cy-f.y)<CS/2){
      f.got=true;gs.fc++;gs.flagsCollected++;
      const pts=gs.fc*100;gs.score+=pts;
      el.s.textContent=String(gs.score).padStart(5,'0');
      sfx1();
      if(gs.score>hi){hi=gs.score;localStorage.setItem('rx',hi);el.h.textContent=String(hi).padStart(5,'0')}
    }
  }

  // Level complete
  if(gs.fc>=10&&!gs.end){
    gs.end=true;
    setTimeout(()=>{gs.lvl++;init();gs.run=true},1000);
    return;
  }

  // Enemy AI
  for(const e of gs.enemies){
    if(e.st>0){e.st--;continue}
    if(e.cd<=0){
      const egx=(e.x/CS)|0,egy=(e.y/CS)|0;
      let bd=999,bdx=e.dx,bdy=e.dy;
      const ds=[[0,-1],[0,1],[-1,0],[1,0]];
      ds.sort(()=>Math.random()-0.5);
      for(const d of ds){
        const nx=egx+d[0],ny=egy+d[1];
        if(can(nx,ny)&&!(d[0]===-e.dx&&d[1]===-e.dy)){
          const dist=Math.abs(nx-gs.gx)+Math.abs(ny-gs.gy);
          if(dist<bd){bd=dist;bdx=d[0];bdy=d[1]}
        }
      }
      e.dx=bdx;e.dy=bdy;
      if(can(egx+e.dx,egy+e.dy)){e.x=(egx+e.dx)*CS+CS/2;e.y=(egy+e.dy)*CS+CS/2}
      e.cd=e.sp+Math.floor(Math.random()*3);
    }else e.cd--;
  }

  // Enemy collision
  for(const e of gs.enemies){
    if(e.st>0)continue;
    if(Math.abs(cx-e.x)<CS-2&&Math.abs(cy-e.y)<CS-2){gs.alive=false;crash();return}
  }

  // Smoke
  gs.smoke=gs.smoke.filter(s=>{
    s.l--;
    if(s.l<=0)return false;
    s.x+=s.vx;s.y+=s.vy;
    for(const e of gs.enemies){
      if(e.st>0)continue;
      if(Math.abs(e.x-s.x)<CS*1.5&&Math.abs(e.y-s.y)<CS*1.5)e.st=30+Math.floor(Math.random()*30);
    }
    return true;
  });

  if(gs.fuel<=0&&gs.alive){gs.alive=false;crash()}
}

function crash(){
  xB();sfx2();el.m.textContent='GAME OVER  SCORE '+gs.score;
  if(gs.score>hi){hi=gs.score;localStorage.setItem('rx',hi);el.h.textContent=String(hi).padStart(5,'0')}
}

function cam(){
  const cx=gs.gx*CS+CS/2,cy=gs.gy*CS+CS/2;
  return{
    x:Math.max(0,Math.min(GW*CS-VW,cx-VW/2)),
    y:Math.max(0,Math.min(GH*CS-VH,cy-VH/2)),
  };
}

function draw(){
  X.fillStyle='#000';X.fillRect(0,0,600,440);

  X.save();X.beginPath();X.rect(0,0,VW,VH);X.clip();
  const c=cam();

  // Floor
  X.fillStyle='#ff88aa';X.fillRect(0,0,VW,VH);

  // Checker pattern
  X.fillStyle='rgba(200,80,120,0.25)';
  const sy=Math.max(0,Math.floor(c.y/CS)-1),sx=Math.max(0,Math.floor(c.x/CS)-1);
  const ey=Math.min(GH,sy+30),ex=Math.min(GW,sx+30);
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    if((x+y)%2===0&&M[y*GW+x]===0)X.fillRect(x*CS-c.x,y*CS-c.y,CS,CS);
  }

  // Walls
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    if(M[y*GW+x]===0)continue;
    X.fillStyle='#eee';
    X.shadowColor='rgba(0,0,0,0.3)';X.shadowBlur=2;
    X.fillRect(x*CS-c.x,y*CS-c.y,CS,CS);
  }
  X.shadowBlur=0;

  // Rocks
  for(const r of gs.rocks){
    const rx=r.x-c.x,ry=r.y-c.y;
    if(rx<-CS||rx>VW+CS||ry<-CS||ry>VH+CS)continue;
    X.fillStyle='#665544';
    X.beginPath();X.ellipse(rx,ry,5,4,0,0,Math.PI*2);X.fill();
    X.fillStyle='#887766';
    X.beginPath();X.ellipse(rx-1,ry-1,2.5,2.5,0,0,Math.PI*2);X.fill();
  }

  // Flags
  for(const f of gs.flags){
    if(f.got)continue;
    const fx=f.x-c.x,fy=f.y-c.y;
    if(fx<-CS||fx>VW+CS||fy<-CS||fy>VH+CS)continue;
    const p=0.7+0.3*Math.sin(gs.clock*0.08+f.x);
    X.save();X.translate(fx,fy);X.scale(p,p);
    X.strokeStyle='#ccc';X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,-7);X.lineTo(0,7);X.stroke();
    X.fillStyle=f.sp?'#ff3333':'#ffcc00';
    X.beginPath();X.moveTo(0,-7);X.lineTo(9,-3);X.lineTo(0,1);X.closePath();X.fill();
    if(f.sp){X.fillStyle='#fff';X.font='5px monospace';X.fillText('S',4,-4)}
    X.restore();
  }

  // Enemies
  for(const e of gs.enemies){
    const ex=e.x-c.x,ey=e.y-c.y;
    if(ex<-CS||ex>VW+CS||ey<-CS||ey>VH+CS)continue;
    X.save();
    if(e.st>0){X.translate(ex,ey);X.rotate(gs.clock*0.15);X.fillStyle='#ff4444';X.shadowColor='#ff0000';X.shadowBlur=8;X.fillRect(-8,-8,16,16);X.restore();continue}
    X.shadowColor='rgba(255,0,0,0.3)';X.shadowBlur=6;
    X.fillStyle='#cc2222';
    X.beginPath();X.moveTo(ex,ey-10);X.lineTo(ex+8,ey-4);X.lineTo(ex+8,ey+4);X.lineTo(ex+6,ey+8);X.lineTo(ex-6,ey+8);X.lineTo(ex-8,ey+4);X.lineTo(ex-8,ey-4);X.closePath();X.fill();
    X.shadowBlur=0;
    X.fillStyle='rgba(255,150,150,0.4)';X.fillRect(ex-5,ey-3,10,5);
    X.fillStyle='#222';
    X.fillRect(ex-9,ey-5,3,4);X.fillRect(ex+6,ey-5,3,4);
    X.fillRect(ex-9,ey+2,3,4);X.fillRect(ex+6,ey+2,3,4);
    X.restore();
  }

  // Player
  const px=gs.gx*CS+CS/2-c.x,py=gs.gy*CS+CS/2-c.y;
  X.save();
  X.shadowColor='rgba(0,100,255,0.4)';X.shadowBlur=8;
  X.fillStyle='#2255cc';
  X.beginPath();X.moveTo(px,py-10);X.lineTo(px+8,py-4);X.lineTo(px+8,py+4);X.lineTo(px+6,py+8);X.lineTo(px-6,py+8);X.lineTo(px-8,py+4);X.lineTo(px-8,py-4);X.closePath();X.fill();
  X.shadowBlur=0;
  X.fillStyle='#3366dd';
  X.beginPath();X.moveTo(px,py-8);X.lineTo(px+5,py-3);X.lineTo(px+5,py+2);X.lineTo(px-5,py+2);X.lineTo(px-5,py-3);X.closePath();X.fill();
  X.fillStyle='rgba(100,200,255,0.4)';X.fillRect(px-5,py-4,10,5);
  X.fillStyle='#222';
  X.fillRect(px-9,py-5,3,4);X.fillRect(px+6,py-5,3,4);
  X.fillRect(px-9,py+2,3,4);X.fillRect(px+6,py+2,3,4);
  X.restore();

  // Smoke
  for(const s of gs.smoke){
    const sx=s.x-c.x,sy=s.y-c.y;
    if(sx<-CS||sx>VW+CS||sy<-CS||sy>VH+CS)continue;
    X.globalAlpha=s.l/s.ml*0.4;
    X.fillStyle='#ddd';X.shadowColor='rgba(200,200,200,0.2)';X.shadowBlur=6;
    X.beginPath();X.arc(sx,sy,s.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;X.shadowBlur=0;
  X.restore();

  // Right panel
  const px2=VW+10;
  X.fillStyle='#12121f';X.fillRect(px2,0,600-px2,440);

  // Radar
  X.strokeStyle='#333';X.strokeRect(px2+5,10,148,148);
  X.fillStyle='#0a0a15';X.fillRect(px2+6,11,146,146);
  const rs=146/Math.max(GW*CS,GH*CS);
  for(const f of gs.flags){if(!f.got){X.fillStyle=f.sp?'#f33':'#fc0';X.fillRect(px2+6+f.x*rs,11+f.y*rs,2,2)}}
  for(const e of gs.enemies){X.fillStyle='#f44';X.fillRect(px2+6+e.x*rs,11+e.y*rs,2,2)}
  X.fillStyle='#4af';X.shadowColor='#4af';X.shadowBlur=3;
  X.fillRect(px2+5+(gs.gx*CS+CS/2)*rs,10+(gs.gy*CS+CS/2)*rs,3,3);
  X.shadowBlur=0;

  // Fuel meter
  X.fillStyle='#888';X.font='10px monospace';X.fillText('FUEL',px2+10,178);
  const fw=140,fh=12;
  X.fillStyle='#222';X.fillRect(px2+10,183,fw,fh);
  const fp=gs.fuel/gs.mf;
  X.fillStyle=fp>0.4?'#4c4':fp>0.2?'#cc4':'#c44';
  X.fillRect(px2+10,183,fw*fp,fh);
  X.strokeStyle='#444';X.strokeRect(px2+10,183,fw,fh);

  // Flags status
  X.fillStyle='#888';X.font='10px monospace';X.fillText('FLAGS',px2+10,215);
  for(let i=0;i<10;i++){
    const col=i%5,row=(i/5)|0;
    X.fillStyle=i<gs.fc?'#fc0':'#333';
    X.fillRect(px2+15+col*28,223+row*16,4,10);
    X.fillStyle=i<gs.fc?'#fc0':'#222';
    X.beginPath();X.moveTo(px2+15+col*28,223+row*16);
    X.lineTo(px2+21+col*28,226+row*16);
    X.lineTo(px2+15+col*28,229+row*16);X.closePath();X.fill();
  }

  // Lives
  X.fillStyle='#888';X.font='10px monospace';X.fillText('LIVES',px2+10,267);
  for(let i=0;i<gs.lives;i++){
    X.fillStyle='#4af';
    X.fillRect(px2+15+i*14,275,8,5);
    X.fillRect(px2+13+i*14,273,12,3);
  }

  // Game over overlay
  if(!gs.alive){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,VW,VH);
    X.textAlign='center';
    X.fillStyle='#f44';X.shadowColor='#f00';X.shadowBlur=15;
    X.font='bold 32px monospace';X.fillText('GAME OVER',VW/2,VH/2-20);
    X.shadowBlur=0;
    X.fillStyle='#fff';X.font='16px monospace';X.fillText('SCORE: '+gs.score,VW/2,VH/2+25);
    X.fillStyle='#888';X.font='11px monospace';X.fillText('PRESS SPACE TO RESTART',VW/2,VH/2+60);
  }
  if(gs.end){
    X.fillStyle='rgba(0,0,0,0.4)';X.fillRect(0,0,VW,VH);
    X.textAlign='center';
    X.fillStyle='#fc0';X.shadowColor='#fc0';X.shadowBlur=15;
    X.font='bold 24px monospace';X.fillText('STAGE CLEAR!',VW/2,VH/2);
    X.shadowBlur=0;
  }
}

function loop(){tick();draw()}

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k===' '||k==='Space'){
    e.preventDefault();
    if(!gs.alive||gs.end){xB();init();gs.run=true;el.m.textContent='';sfx3();sB();return}
    if(!gs.run){gs.run=true;el.m.textContent='';sfx3();sB();return}
    if(gs.fuel>=15){
      gs.fuel=Math.max(0,gs.fuel-15);
      const cx=gs.gx*CS+CS/2,cy=gs.gy*CS+CS/2;
      for(let i=0;i<4;i++)gs.smoke.push({x:cx+(-gs.dx)*8+(Math.random()-0.5)*16,y:cy+(-gs.dy)*8+(Math.random()-0.5)*16,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:8+Math.random()*6,ml:25,l:25+Math.random()*10});
      for(let i=0;i<6;i++)setTimeout(()=>pt(80+Math.random()*50,.1,'sawtooth',.025),i*30);
    }
    return;
  }
  const m={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]};
  if(m[k]){
    dir=m[k];
    if(!gs.run){gs.run=true;el.m.textContent='';sfx3();sB()}
    e.preventDefault();
  }
});

document.addEventListener('keyup',e=>{
  if({ArrowLeft:1,ArrowRight:1,ArrowUp:1,ArrowDown:1}[e.key])dir=null;
});

let tx=null,ty=null;
C.addEventListener('touchstart',e=>{
  const t=e.touches[0];tx=t.clientX;ty=t.clientY;
  if(!gs.run&&t.clientX<VW){gs.run=true;el.m.textContent='';sfx3();sB()}
},{passive:true});
C.addEventListener('touchmove',e=>{
  if(!tx||!gs.run||!gs.alive)return;
  const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
  if(Math.abs(dx)>15||Math.abs(dy)>15){
    if(Math.abs(dx)>Math.abs(dy))dir=dx>0?[1,0]:[-1,0];
    else dir=dy>0?[0,1]:[0,-1];
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});
C.addEventListener('touchend',()=>{tx=null;ty=null;dir=null},{passive:true});

init();
setInterval(loop,1000/30);
</script>
</body>
</html>
