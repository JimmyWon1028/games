<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快打旋風：街頭對決</title>
  <style>
    :root {
      --bg-1: #0b0a10;
      --bg-2: #1a1630;
      --accent: #ffd75f;
      --hp: #5df28e;
      --hp-damage: #ff6f6f;
      --panel: #141424;
      --bezel: #0a0b10;
      --metal: #2b3145;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% -20%, rgba(255, 120, 40, 0.18), transparent 42%),
        radial-gradient(circle at 10% 10%, rgba(100, 115, 255, 0.22), transparent 35%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      color: #f7fbff;
      font-family: "Trebuchet MS", "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: 16px;
    }

    .shell {
      width: min(96vw, 980px);
      background: linear-gradient(180deg, #1f2333, #0f111a 14%, #101320 100%);
      border: 3px solid #393f51;
      border-radius: 14px;
      padding: 12px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.55),
        inset 0 0 0 2px rgba(255, 255, 255, 0.06),
        inset 0 -18px 40px rgba(0, 0, 0, 0.35);
    }

    .marquee {
      background: linear-gradient(90deg, #7a1111, #d84a16 45%, #7a1111);
      border: 2px solid rgba(255, 214, 109, 0.65);
      border-radius: 8px;
      color: #ffe9a8;
      text-align: center;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 22px;
      padding: 8px 10px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(255, 225, 132, 0.65);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hp-wrap {
      height: 22px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .hp {
      height: 100%;
      background: linear-gradient(90deg, var(--hp), #2ac3ff);
      transition: width 0.1s linear;
      box-shadow: inset 0 -8px 14px rgba(0, 0, 0, 0.25);
      background-image:
        linear-gradient(90deg, rgba(255, 255, 255, 0.2), transparent 30%),
        repeating-linear-gradient(90deg, transparent 0 14px, rgba(0, 0, 0, 0.18) 14px 16px);
    }

    .right .hp {
      margin-left: auto;
      background: linear-gradient(90deg, #ffb15f, var(--hp-damage));
    }

    .middle {
      text-align: center;
      min-width: 130px;
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 6px 8px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(255, 215, 95, 0.45);
    }

    .timer {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 1px;
    }

    #game {
      width: 100%;
      height: auto;
      display: block;
      border: 3px solid #2f3547;
      border-radius: 8px;
      background: #0f1b32;
      image-rendering: pixelated;
    }

    .screen-wrap {
      position: relative;
      border: 8px solid var(--bezel);
      border-radius: 12px;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.07),
        inset 0 0 40px rgba(0, 0, 0, 0.75);
      overflow: hidden;
    }

    .scanlines,
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scanlines {
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.06) 0,
        rgba(255, 255, 255, 0.06) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.12;
      mix-blend-mode: screen;
    }

    .vignette {
      background: radial-gradient(circle at center, transparent 55%, rgba(0, 0, 0, 0.38) 100%);
    }

    .controls {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #dce9ff;
      background: linear-gradient(180deg, var(--metal), #1f2538);
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .btn {
      border: 2px solid #452300;
      border-radius: 6px;
      padding: 8px 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffe28a, #ff9f4a);
      color: #341200;
      cursor: pointer;
    }

    .char-select {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      background: rgba(8, 10, 18, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      color: #e1ebff;
    }

    .char-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #f7fbff;
      font-size: 12px;
      border-radius: 6px;
      padding: 5px 9px;
      cursor: pointer;
    }

    .char-btn.active {
      background: linear-gradient(135deg, #5a81ff, #7f5dff);
      border-color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="marquee">STREET FIGHTER - ARCADE MODE</div>
    <section class="hud">
      <div class="left">
        <div style="margin-bottom: 5px; font-size: 12px;">P1 你</div>
        <div class="hp-wrap"><div id="p1hp" class="hp" style="width:100%"></div></div>
      </div>
      <div class="middle">
        <div class="title">快打旋風</div>
        <div id="timer" class="timer">60</div>
      </div>
      <div class="right">
        <div style="margin-bottom: 5px; font-size: 12px; text-align:right;">CPU</div>
        <div class="hp-wrap"><div id="p2hp" class="hp" style="width:100%"></div></div>
      </div>
    </section>

    <div class="screen-wrap">
      <canvas id="game" width="960" height="540"></canvas>
      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>

    <section class="controls">
      <div>WASD 移動/跳躍/下蹲，J 防禦，F 輕拳，G 重拳，H 波動拳，R 重開</div>
      <button id="startBtn" class="btn">開始對戰</button>
    </section>

    <section class="char-select">
      <span>角色：</span>
      <button class="char-btn active" data-char="karate">空手家</button>
      <button class="char-btn" data-char="boxer">拳王</button>
      <button class="char-btn" data-char="ninja">忍者</button>
      <button class="char-btn" data-char="commander">軍官</button>
      <span id="charTip">目前：空手家（可按 1-4 切換）</span>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    const p1hpEl = document.getElementById("p1hp");
    const p2hpEl = document.getElementById("p2hp");
    const timerEl = document.getElementById("timer");
    const startBtn = document.getElementById("startBtn");
    const charTipEl = document.getElementById("charTip");
    const charButtons = Array.from(document.querySelectorAll(".char-btn"));
    let audioCtx = null;
    let audioReady = false;

    const GROUND_Y = 440;
    const GRAVITY = 1800;
    const SPEED = 260;
    const JUMP_V = -720;
    const ROUND_TIME = 60;

    const input = { left: false, right: false, up: false, down: false, guard: false, punch: false, heavy: false, skill: false };

    const world = {
      running: false,
      over: false,
      msg: "按 開始對戰",
      timer: ROUND_TIME,
      last: 0,
      projectiles: [],
      hitFlash: 0,
      shake: 0,
      p1: null,
      p2: null
    };

    const ATTACKS = {
      punch: { total: 0.34, activeStart: 0.09, damage: 9, reach: 74, knock: 140 },
      heavy: { total: 0.52, activeStart: 0.13, damage: 16, reach: 94, knock: 220 },
      skill: { total: 0.58, activeStart: 0.17, damage: 14, projectileSpeed: 480 }
    };

    const CHARACTERS = {
      karate: {
        name: "空手家",
        desc: "平衡型",
        hp: 100,
        speed: 1,
        jump: 1,
        attackSpeed: 1,
        punchDmg: 1,
        heavyDmg: 1,
        skillDmg: 1,
        skillSpeed: 1,
        palette: {
          cloth: "#f3f4f8",
          clothShade: "#cdd2df",
          pants: "#2e6ef0",
          pantsShade: "#1f4ebd",
          glove: "#cc2c38",
          gloveShade: "#8a1722"
        }
      },
      boxer: {
        name: "拳王",
        desc: "高拳擊傷害",
        hp: 108,
        speed: 0.95,
        jump: 0.95,
        attackSpeed: 0.94,
        punchDmg: 1.28,
        heavyDmg: 1.16,
        skillDmg: 0.8,
        skillSpeed: 0.92,
        palette: {
          cloth: "#ffe2b5",
          clothShade: "#d5b88a",
          pants: "#5a4a42",
          pantsShade: "#392f2a",
          glove: "#d14a21",
          gloveShade: "#8d2e14"
        }
      },
      ninja: {
        name: "忍者",
        desc: "高速靈活",
        hp: 88,
        speed: 1.22,
        jump: 1.16,
        attackSpeed: 1.2,
        punchDmg: 0.88,
        heavyDmg: 0.9,
        skillDmg: 1.12,
        skillSpeed: 1.24,
        palette: {
          cloth: "#d9e0ff",
          clothShade: "#a4b0dc",
          pants: "#2c2e3a",
          pantsShade: "#181a22",
          glove: "#6a76ff",
          gloveShade: "#3c45b8"
        }
      },
      commander: {
        name: "軍官",
        desc: "耐久穩重",
        hp: 124,
        speed: 0.88,
        jump: 0.9,
        attackSpeed: 0.92,
        punchDmg: 1.02,
        heavyDmg: 1.12,
        skillDmg: 1.02,
        skillSpeed: 0.9,
        palette: {
          cloth: "#c3d7a8",
          clothShade: "#95a87e",
          pants: "#36553b",
          pantsShade: "#1f3324",
          glove: "#d7a246",
          gloveShade: "#8f692c"
        }
      }
    };

    const KEY_TO_CHAR = {
      "1": "karate",
      "2": "boxer",
      "3": "ninja",
      "4": "commander"
    };

    let selectedChar = "karate";

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      audioReady = true;
    }

    function tone(type, freq, duration, volume, glide = 1) {
      if (!audioReady) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(30, freq * glide), now + duration);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playSfx(name) {
      if (!audioReady) return;
      if (name === "start") {
        tone("square", 330, 0.08, 0.08, 1.3);
        setTimeout(() => tone("square", 494, 0.09, 0.08, 1.2), 80);
      }
      if (name === "punch") tone("square", 210, 0.05, 0.08, 0.8);
      if (name === "heavy") {
        tone("sawtooth", 170, 0.08, 0.1, 0.65);
        setTimeout(() => tone("triangle", 120, 0.06, 0.08, 0.9), 32);
      }
      if (name === "skill") {
        tone("triangle", 240, 0.14, 0.09, 1.7);
        setTimeout(() => tone("triangle", 320, 0.12, 0.07, 1.4), 60);
      }
      if (name === "hit") tone("sawtooth", 130, 0.07, 0.1, 0.5);
      if (name === "block") tone("square", 90, 0.06, 0.08, 0.9);
      if (name === "jump") tone("square", 270, 0.08, 0.06, 1.6);
      if (name === "ko") {
        tone("sawtooth", 210, 0.2, 0.12, 0.55);
        setTimeout(() => tone("triangle", 120, 0.3, 0.1, 0.6), 130);
      }
      if (name === "win") {
        tone("triangle", 392, 0.08, 0.08, 1.26);
        setTimeout(() => tone("triangle", 494, 0.1, 0.08, 1.2), 90);
        setTimeout(() => tone("triangle", 659, 0.12, 0.08, 1.1), 190);
      }
    }

    function createFighter(x, facing, colorA, colorB) {
      return {
        x,
        y: GROUND_Y,
        vx: 0,
        vy: 0,
        w: 70,
        h: 120,
        facing,
        hp: 100,
        maxHp: 100,
        colorA,
        colorB,
        attackTimer: 0,
        attackType: "",
        attackElapsed: 0,
        attackTotal: 0,
        attackDone: false,
        hitTimer: 0,
        cooldown: 0,
        guardTimer: 0,
        crouchTimer: 0,
        state: "idle"
      };
    }

    function getSelectedProfile() {
      return CHARACTERS[selectedChar] || CHARACTERS.karate;
    }

    function getProfileForFighter(fighter) {
      if (fighter === world.p1) return getSelectedProfile();
      return {
        hp: 100,
        speed: 1,
        jump: 1,
        attackSpeed: 1,
        punchDmg: 1,
        heavyDmg: 1,
        skillDmg: 1,
        skillSpeed: 1
      };
    }

    function getAttackConfig(attacker, type) {
      const base = ATTACKS[type];
      if (!base) return null;
      const profile = getProfileForFighter(attacker);
      const dmgScale = type === "punch"
        ? profile.punchDmg
        : type === "heavy"
          ? profile.heavyDmg
          : profile.skillDmg;
      return {
        ...base,
        total: base.total / profile.attackSpeed,
        activeStart: base.activeStart / profile.attackSpeed,
        damage: Math.max(1, Math.round(base.damage * dmgScale)),
        projectileSpeed: base.projectileSpeed ? base.projectileSpeed * profile.skillSpeed : undefined
      };
    }

    function syncPlayerStatsWithCharacter() {
      if (!world.p1) return;
      const profile = getSelectedProfile();
      const ratio = world.p1.maxHp > 0 ? world.p1.hp / world.p1.maxHp : 1;
      world.p1.maxHp = profile.hp;
      world.p1.hp = Math.max(0, Math.min(profile.hp, Math.round(profile.hp * ratio)));
      updateHud();
    }

    function updateCharacterUI() {
      const profile = getSelectedProfile();
      charButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.char === selectedChar);
      });
      charTipEl.textContent = `目前：${profile.name}（${profile.desc}，可按 1-4 切換）`;
    }

    function selectCharacter(charKey) {
      if (!CHARACTERS[charKey] || charKey === selectedChar) return;
      selectedChar = charKey;
      buildSpriteCache();
      syncPlayerStatsWithCharacter();
      updateCharacterUI();
    }

    function isBlocking(defender, attacker) {
      if (defender.state !== "guard") return false;
      if (defender.y < GROUND_Y - 1) return false;
      return defender.facing * (attacker.x - defender.x) > 0;
    }

    function resetGame() {
      initAudio();
      const profile = getSelectedProfile();
      world.running = true;
      world.over = false;
      world.timer = ROUND_TIME;
      world.last = 0;
      world.projectiles = [];
      world.hitFlash = 0;
      world.shake = 0;
      world.msg = "Fight!";
      world.p1 = createFighter(220, 1, "#ffe7a3", "#4a88ff");
      world.p1.maxHp = profile.hp;
      world.p1.hp = profile.hp;
      world.p2 = createFighter(740, -1, "#ffc09e", "#ff5b6b");
      world.p2.maxHp = 100;
      updateHud();
      playSfx("start");
    }

    function updateHud() {
      p1hpEl.style.width = `${Math.max(0, (world.p1.hp / world.p1.maxHp) * 100)}%`;
      p2hpEl.style.width = `${Math.max(0, (world.p2.hp / world.p2.maxHp) * 100)}%`;
      timerEl.textContent = Math.max(0, Math.ceil(world.timer));
    }

    function spawnProjectile(owner, speed, damage) {
      world.projectiles.push({
        x: owner.x + owner.facing * 52,
        y: owner.y - 60,
        vx: owner.facing * speed,
        r: 12,
        dmg: damage,
        owner
      });
    }

    function attack(attacker, defender, type) {
      if (attacker.cooldown > 0) return;
      const cfg = getAttackConfig(attacker, type);
      if (!cfg) return;

      attacker.cooldown = cfg.total;
      attacker.attackTimer = cfg.total;
      attacker.state = type;
      attacker.attackType = type;
      attacker.attackElapsed = 0;
      attacker.attackTotal = cfg.total;
      attacker.attackDone = false;

      if (type === "punch") playSfx("punch");
      if (type === "heavy") playSfx("heavy");
      if (type === "skill") playSfx("skill");
    }

    function resolveMeleeHit(attacker, defender, cfg) {
      const close = Math.abs(attacker.x - defender.x) < cfg.reach;
      const sameH = Math.abs((attacker.y - attacker.h / 2) - (defender.y - defender.h / 2)) < 75;
      const front = attacker.facing * (defender.x - attacker.x) > 0;

      if (!close || !sameH || !front || defender.hitTimer > 0) return;

      if (isBlocking(defender, attacker)) {
        defender.hp -= Math.ceil(cfg.damage * 0.2);
        defender.hitTimer = 0.1;
        defender.vx = attacker.facing * 70;
        world.hitFlash = 0.04;
        world.shake = 2;
        playSfx("block");
        return;
      }

      defender.hp -= cfg.damage;
      defender.hitTimer = 0.22;
      defender.vx = attacker.facing * cfg.knock;
      world.hitFlash = 0.08;
      world.shake = cfg.damage >= 16 ? 6 : 3;
      playSfx("hit");
    }

    function processAttack(attacker, defender, dt) {
      if (!attacker.attackType) return;
      const cfg = getAttackConfig(attacker, attacker.attackType);
      if (!cfg) return;
      const prev = attacker.attackElapsed;
      attacker.attackElapsed += dt;

      if (!attacker.attackDone && prev < cfg.activeStart && attacker.attackElapsed >= cfg.activeStart) {
        if (attacker.attackType === "skill") {
          spawnProjectile(attacker, cfg.projectileSpeed, cfg.damage);
        } else {
          resolveMeleeHit(attacker, defender, cfg);
        }
        attacker.attackDone = true;
      }

      if (attacker.attackElapsed >= attacker.attackTotal) {
        attacker.attackType = "";
        attacker.attackElapsed = 0;
        attacker.attackTotal = 0;
        attacker.attackDone = false;
      }
    }

    function applyPhysics(f, dt) {
      f.vy += GRAVITY * dt;
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.vx *= 0.84;

      if (f.y > GROUND_Y) {
        f.y = GROUND_Y;
        f.vy = 0;
      }

      f.x = Math.max(45, Math.min(canvas.width - 45, f.x));
      f.cooldown = Math.max(0, f.cooldown - dt);
      f.attackTimer = Math.max(0, f.attackTimer - dt);
      f.hitTimer = Math.max(0, f.hitTimer - dt);
      f.guardTimer = Math.max(0, f.guardTimer - dt);
      f.crouchTimer = Math.max(0, f.crouchTimer - dt);
      if (f.attackTimer <= 0 && f.hitTimer <= 0 && !["guard", "crouch", "victory"].includes(f.state)) {
        f.state = "idle";
      }
    }

    function updatePlayer(dt) {
      const p = world.p1;
      const e = world.p2;
      const profile = getSelectedProfile();

      if (input.left) {
        p.vx = -SPEED * profile.speed;
        p.facing = -1;
      } else if (input.right) {
        p.vx = SPEED * profile.speed;
        p.facing = 1;
      }

      if (input.down && p.y >= GROUND_Y - 1 && p.attackTimer <= 0) {
        p.state = "crouch";
        p.crouchTimer = 0.08;
        p.vx *= 0.4;
      } else if (p.state === "crouch" && p.crouchTimer <= 0 && p.attackTimer <= 0) {
        p.state = "idle";
      }

      if (input.guard && p.y >= GROUND_Y - 1 && p.attackTimer <= 0) {
        p.state = "guard";
        p.guardTimer = 0.1;
        p.vx *= 0.3;
      } else if (p.state === "guard" && p.guardTimer <= 0) {
        p.state = "idle";
      }

      if (input.up && p.y >= GROUND_Y - 1) {
        p.vy = JUMP_V * profile.jump;
        playSfx("jump");
      }

      if (input.punch && p.state !== "guard") {
        attack(p, e, "punch");
        input.punch = false;
      }
      if (input.heavy && p.state !== "guard") {
        attack(p, e, "heavy");
        input.heavy = false;
      }
      if (input.skill && p.state !== "guard") {
        attack(p, e, "skill");
        input.skill = false;
      }

      processAttack(p, e, dt);

      applyPhysics(p, dt);
    }

    function updateCPU(dt) {
      const p = world.p1;
      const e = world.p2;
      const dist = p.x - e.x;

      e.facing = dist < 0 ? -1 : 1;

      if (Math.abs(dist) > 90) {
        e.vx = dist > 0 ? 180 : -180;
      } else {
        e.vx = 0;
      }

      if (e.y >= GROUND_Y - 1 && Math.random() < 0.007) {
        e.vy = JUMP_V * 0.95;
      }

      if (e.cooldown <= 0) {
        if (Math.abs(dist) < 80 && Math.random() < 0.07) attack(e, p, "punch");
        else if (Math.abs(dist) < 110 && Math.random() < 0.04) attack(e, p, "heavy");
        else if (Math.abs(dist) > 180 && Math.random() < 0.02) attack(e, p, "skill");
      }

      processAttack(e, p, dt);

      if (Math.abs(dist) < 90 && p.attackTimer > 0 && Math.random() < 0.14) {
        e.state = "guard";
        e.guardTimer = 0.18;
      } else if (Math.abs(dist) < 70 && Math.random() < 0.02) {
        e.state = "crouch";
        e.crouchTimer = 0.18;
      } else if (e.state === "guard" && e.guardTimer <= 0 && e.attackTimer <= 0) {
        e.state = "idle";
      }

      applyPhysics(e, dt);
    }

    function updateProjectiles(dt) {
      for (let i = world.projectiles.length - 1; i >= 0; i -= 1) {
        const p = world.projectiles[i];
        p.x += p.vx * dt;

        const target = p.owner === world.p1 ? world.p2 : world.p1;
        const hitX = Math.abs(p.x - target.x) < target.w * 0.45;
        const hitY = Math.abs(p.y - (target.y - 60)) < target.h * 0.45;

        if (hitX && hitY && target.hitTimer <= 0) {
          const attacker = p.owner;
          if (isBlocking(target, attacker)) {
            target.hp -= Math.ceil(p.dmg * 0.2);
            target.hitTimer = 0.08;
            target.vx = p.vx * 0.06;
            world.hitFlash = 0.04;
            world.shake = 2;
            playSfx("block");
          } else {
            target.hp -= p.dmg;
            target.hitTimer = 0.2;
            target.vx = p.vx * 0.22;
            world.hitFlash = 0.1;
            world.shake = 5;
            playSfx("hit");
          }
          world.projectiles.splice(i, 1);
          continue;
        }

        if (p.x < -50 || p.x > canvas.width + 50) {
          world.projectiles.splice(i, 1);
        }
      }
    }

    function checkEnd() {
      if (world.p1.hp <= 0 || world.p2.hp <= 0 || world.timer <= 0) {
        world.running = false;
        world.over = true;
        playSfx("ko");
        if (world.p1.hp === world.p2.hp) {
          world.msg = "平手";
        } else if (world.p1.hp > world.p2.hp) {
          world.msg = "你贏了";
          world.p1.state = "victory";
          playSfx("win");
        } else {
          world.msg = "CPU 勝利";
          world.p2.state = "victory";
          playSfx("win");
        }
      }
    }

    function drawStage() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#17345f");
      sky.addColorStop(0.55, "#102449");
      sky.addColorStop(1, "#0c1428");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#5a8bff";
      ctx.beginPath();
      ctx.arc(760, 90, 36, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#121c33";
      for (let i = 0; i < 14; i += 1) {
        const w = 44 + (i % 3) * 16;
        const h = 120 + (i % 4) * 26;
        ctx.fillRect(i * 72, 240 - h, w, h);
      }

      ctx.fillStyle = "#3f245e";
      ctx.fillRect(80, 130, 240, 24);
      ctx.fillStyle = "#ffd67f";
      ctx.font = "700 18px Trebuchet MS";
      ctx.fillText("ARCADE BATTLE", 110, 148);

      ctx.fillStyle = "#33435e";
      ctx.fillRect(0, 360, canvas.width, 180);

      ctx.fillStyle = "#1b1d28";
      for (let i = 0; i < 40; i += 1) {
        const x = i * 26;
        const h = 26 + ((i * 17) % 30);
        ctx.fillRect(x, 360 - h, 16, h);
        ctx.beginPath();
        ctx.arc(x + 8, 360 - h - 8, 7, Math.PI, 0);
        ctx.fill();
      }

      ctx.fillStyle = "#5a4b3d";
      ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 18; i += 1) {
        ctx.beginPath();
        ctx.moveTo(i * 60, GROUND_Y);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
      }

      for (let i = 0; i < 20; i += 1) {
        ctx.fillStyle = i % 2 ? "#716050" : "#5f4f40";
        ctx.fillRect(i * 48, GROUND_Y + 26, 36, 36);
      }
    }

    const SPRITE_W = 24;
    const SPRITE_H = 32;
    const SPRITE_SCALE = 4;
    const POSES = {
      idle: [
        { bob: 0, lLeg: 0, rLeg: 1, fArm: 1, fArmY: 0, bArmY: 0, lean: 0, torsoY: 0 },
        { bob: 1, lLeg: 1, rLeg: 0, fArm: 0, fArmY: 1, bArmY: 1, lean: 0, torsoY: 0 }
      ],
      walk: [
        { bob: 0, lLeg: 0, rLeg: 4, fArm: 1, fArmY: 1, bArmY: -1, lean: 0, torsoY: 0 },
        { bob: 1, lLeg: 3, rLeg: 1, fArm: 2, fArmY: 0, bArmY: 0, lean: 1, torsoY: 0 },
        { bob: 0, lLeg: 4, rLeg: 0, fArm: 1, fArmY: -1, bArmY: 1, lean: 0, torsoY: 0 },
        { bob: 1, lLeg: 1, rLeg: 3, fArm: 2, fArmY: 0, bArmY: 0, lean: -1, torsoY: 0 }
      ],
      punch: [
        { bob: 0, lLeg: 1, rLeg: 1, fArm: 1, fArmY: 0, bArmY: 1, lean: 0, torsoY: 0 },
        { bob: 0, lLeg: 1, rLeg: 1, fArm: 6, fArmY: -1, bArmY: 1, lean: 1, torsoY: 0 },
        { bob: 0, lLeg: 1, rLeg: 1, fArm: 9, fArmY: -1, bArmY: 1, lean: 2, torsoY: -1 },
        { bob: 0, lLeg: 1, rLeg: 2, fArm: 7, fArmY: 0, bArmY: 1, lean: 1, torsoY: 0 },
        { bob: 0, lLeg: 1, rLeg: 1, fArm: 2, fArmY: 0, bArmY: 1, lean: 0, torsoY: 0 }
      ],
      heavy: [
        { bob: 0, lLeg: 2, rLeg: 1, fArm: 3, fArmY: 0, bArmY: 1, lean: 0, torsoY: 0 },
        { bob: 0, lLeg: 3, rLeg: 0, fArm: 10, fArmY: -2, bArmY: 1, lean: 2, torsoY: -1 },
        { bob: 0, lLeg: 3, rLeg: 0, fArm: 12, fArmY: -3, bArmY: 1, lean: 3, torsoY: -1 },
        { bob: 0, lLeg: 2, rLeg: 1, fArm: 9, fArmY: -1, bArmY: 1, lean: 1, torsoY: 0 },
        { bob: 0, lLeg: 2, rLeg: 1, fArm: 3, fArmY: 0, bArmY: 1, lean: 0, torsoY: 0 }
      ],
      crouch: [
        { bob: 0, lLeg: 6, rLeg: 6, fArm: 1, fArmY: 4, bArmY: 4, lean: 0, torsoY: 4 }
      ],
      guard: [
        { bob: 0, lLeg: 3, rLeg: 3, fArm: 1, fArmY: -1, bArmY: 0, lean: -2, torsoY: 1 },
        { bob: 0, lLeg: 3, rLeg: 3, fArm: 0, fArmY: 0, bArmY: 1, lean: -2, torsoY: 1 }
      ],
      hit: [
        { bob: 0, lLeg: 0, rLeg: 2, fArm: 0, fArmY: 2, bArmY: 2, lean: -2, torsoY: -1 }
      ],
      jump: [
        { bob: -1, lLeg: 6, rLeg: 4, fArm: 2, fArmY: -3, bArmY: -3, lean: 0, torsoY: -2 }
      ],
      victory: [
        { bob: 0, lLeg: 0, rLeg: 1, fArm: 2, fArmY: -7, bArmY: 2, lean: 1, torsoY: -1 },
        { bob: 1, lLeg: 0, rLeg: 1, fArm: 2, fArmY: -8, bArmY: 1, lean: 1, torsoY: -1 }
      ]
    };

    const spriteCache = { p1: {}, p2: {} };

    function makePalette(isP1) {
      const selected = getSelectedProfile();
      return isP1
        ? {
            skin: "#f0c7a0",
            skin2: "#d49d77",
            hair: "#1c1b22",
            cloth: selected.palette.cloth,
            clothShade: selected.palette.clothShade,
            pants: selected.palette.pants,
            pantsShade: selected.palette.pantsShade,
            glove: selected.palette.glove,
            gloveShade: selected.palette.gloveShade
          }
        : {
            skin: "#efb891",
            skin2: "#d19470",
            hair: "#2a1a2a",
            cloth: "#f7d35c",
            clothShade: "#d3ad40",
            pants: "#d84256",
            pantsShade: "#b22f42",
            glove: "#2952d1",
            gloveShade: "#1a368f"
          };
    }

    function renderPoseToCanvas(pal, pose, stateName, style) {
      const cv = document.createElement("canvas");
      cv.width = SPRITE_W;
      cv.height = SPRITE_H;
      const c = cv.getContext("2d");
      c.imageSmoothingEnabled = false;

      function px(x, y, w, h, color) {
        c.fillStyle = color;
        c.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
      }

      function pxb(x, y, w, h, color) {
        px(x - 1, y - 1, w + 2, h + 2, "#101116");
        px(x, y, w, h, color);
      }

      const torsoY = 10 + (pose.torsoY || 0);
      const headY = 4 + (pose.torsoY || 0);

      px(8, 31, 8, 1, "rgba(0,0,0,0.34)");

      pxb(7, 20 + pose.lLeg, 4, 9 - Math.min(4, pose.lLeg), pal.pantsShade);
      pxb(13, 20 + pose.rLeg, 4, 9 - Math.min(4, pose.rLeg), pal.pants);
      px(7, 22 + pose.lLeg, 4, 2, "rgba(255,255,255,0.11)");
      px(13, 22 + pose.rLeg, 4, 2, "rgba(255,255,255,0.11)");
      pxb(6, 29, 6, 2, "#15161b");
      pxb(12, 29, 6, 2, "#15161b");

      if (style === "p1") {
        pxb(7, torsoY, 10, 10, pal.cloth);
        px(7, torsoY + 4, 10, 6, pal.clothShade);
        px(11, torsoY, 2, 10, "rgba(255,255,255,0.2)");
        px(10, torsoY + 2, 4, 4, "#f8fbff");
        px(11, torsoY + 3, 2, 3, "#daddf0");
        px(7, torsoY + 7, 10, 1, "#15171f");
        px(10, torsoY + 7, 4, 1, "#cf2d39");
        px(11, torsoY + 8, 2, 2, "#892132");

        pxb(4, torsoY + 2 + pose.bArmY, 3, 3, pal.clothShade);
        pxb(3, torsoY + 5 + pose.bArmY, 3, 3, pal.skin2);
        pxb(3, torsoY + 7 + pose.bArmY, 3, 2, pal.gloveShade);
        px(4, torsoY + 8 + pose.bArmY, 2, 1, "#c95a65");

        pxb(17, torsoY + 2 + pose.fArmY, 3, 3, pal.clothShade);
        pxb(19, torsoY + 4 + pose.fArmY, 2 + pose.fArm, 3, pal.skin);
        pxb(20 + pose.fArm, torsoY + 6 + pose.fArmY, 3, 2, pal.glove);
        px(20 + pose.fArm, torsoY + 6 + pose.fArmY, 2, 1, "#ffd2d8");

        px(6, torsoY + 3, 1, 3, "#f3f4f8");
        px(17, torsoY + 3, 1, 3, "#f3f4f8");
        px(9, torsoY + 9, 1, 3, "#ffffff");
        px(13, torsoY + 9, 1, 3, "#ffffff");
        px(9, torsoY + 12, 1, 1, "#cf2d39");
        px(13, torsoY + 12, 1, 1, "#cf2d39");
      } else {
        pxb(7, torsoY, 10, 10, "#c74b58");
        px(7, torsoY + 4, 10, 6, "#9f2f3f");
        px(9, torsoY + 1, 6, 2, "#3f141a");
        px(10, torsoY + 5, 4, 1, "#ff7d8e");
        px(10, torsoY + 7, 4, 1, "#15171f");
        px(11, torsoY + 8, 2, 2, "#d8a44f");

        pxb(4, torsoY + 2 + pose.bArmY, 3, 2, "#a62e3c");
        pxb(3, torsoY + 4 + pose.bArmY, 3, 4, pal.skin2);
        pxb(3, torsoY + 7 + pose.bArmY, 3, 2, pal.gloveShade);
        px(4, torsoY + 8 + pose.bArmY, 2, 1, "#9ac1ff");

        pxb(17, torsoY + 2 + pose.fArmY, 3, 2, "#a62e3c");
        pxb(19, torsoY + 3 + pose.fArmY, 2 + pose.fArm, 4, pal.skin);
        pxb(20 + pose.fArm, torsoY + 6 + pose.fArmY, 3, 2, pal.glove);
        px(20 + pose.fArm, torsoY + 6 + pose.fArmY, 2, 1, "#a8c6ff");

        pxb(6, torsoY + 1, 2, 4, "#7f2f3a");
        pxb(16, torsoY + 1, 2, 4, "#7f2f3a");
        pxb(9, torsoY + 2, 6, 4, "#6e7486");
        px(10, torsoY + 3, 4, 1, "#b5bfd6");
      }

      if (style === "p1") {
        pxb(8, headY - 1, 8, 3, pal.hair);
        px(7, headY, 1, 2, pal.hair);
        px(16, headY, 1, 2, pal.hair);
        pxb(8, headY + 1, 8, 6, pal.skin);
        px(8, headY + 1, 8, 1, pal.hair);
        px(9, headY + 2, 6, 1, "#ffffff");
        px(11, headY + 2, 2, 1, "#d5354c");
        px(10, headY + 4, 1, 1, "#16171d");
        px(13, headY + 4, 1, 1, "#16171d");
        px(11, headY + 5, 2, 1, "#16171d");
        px(11, headY + 7, 2, 1, pal.skin2);
        px(7, headY + 2, 1, 1, "#f7e1c9");
        px(16, headY + 2, 1, 1, "#f7e1c9");
        px(11, headY - 2, 2, 1, "#fff4bf");
        px(7, headY + 1, 1, 2, "#d13e52");
        px(16, headY + 1, 1, 2, "#d13e52");
        px(5, headY + 2, 2, 1, "#d13e52");
      } else {
        pxb(8, headY - 1, 8, 3, "#2d1b2d");
        px(7, headY, 1, 2, "#2d1b2d");
        px(16, headY, 1, 2, "#2d1b2d");
        pxb(8, headY + 1, 8, 6, pal.skin);
        px(8, headY + 1, 8, 1, "#2d1b2d");
        px(9, headY + 2, 6, 1, "#89c8ff");
        px(11, headY + 2, 2, 1, "#1d4f8e");
        px(10, headY + 4, 1, 1, "#101319");
        px(13, headY + 4, 1, 1, "#101319");
        px(11, headY + 5, 2, 1, "#101319");
        px(11, headY + 7, 2, 1, pal.skin2);
        px(7, headY + 2, 1, 1, "#e8c1a7");
        px(16, headY + 2, 1, 1, "#e8c1a7");
        px(11, headY - 2, 2, 1, "#7bc8ff");
        px(7, headY + 2, 1, 1, "#2f1017");
        px(16, headY + 2, 1, 1, "#2f1017");
        px(5, headY + 1, 2, 2, "#7bc8ff");
      }

      if (stateName === "guard") {
        px(18, torsoY + 1, 3, 9, "#aeb4c6");
        px(18, torsoY + 1, 1, 9, "#7d8390");
      }
      if (stateName === "victory") {
        px(7, headY - 4, 10, 2, "#fff2af");
      }

      return cv;
    }

    function buildSpriteCache() {
      const palettes = { p1: makePalette(true), p2: makePalette(false) };
      ["p1", "p2"].forEach((side) => {
        spriteCache[side] = {};
        Object.keys(POSES).forEach((state) => {
          spriteCache[side][state] = POSES[state].map((pose) => renderPoseToCanvas(palettes[side], pose, state, side));
        });
      });
    }

    function drawFighter(f) {
      ctx.save();

      const flash = f.hitTimer > 0 && Math.floor(Date.now() / 50) % 2 === 0;
      ctx.globalAlpha = flash ? 0.42 : 1;

      let anim = "idle";
      if (f.state === "victory") anim = "victory";
      else if (f.hitTimer > 0) anim = "hit";
      else if (f.state === "guard") anim = "guard";
      else if (f.state === "crouch") anim = "crouch";
      else if (f.y < GROUND_Y - 1) anim = "jump";
      else if (f.attackTimer > 0) anim = f.state === "skill" ? "heavy" : f.state;
      else if (Math.abs(f.vx) > 30) anim = "walk";

      const frames = POSES[anim] || POSES.idle;
      let speed = anim === "walk" ? 90 : anim === "victory" ? 150 : 130;
      if ((anim === "punch" || anim === "heavy") && f.attackTotal > 0) {
        speed = Math.max(45, (f.attackTotal * 1000) / frames.length);
      }
      const pose = frames[Math.floor(Date.now() / speed) % frames.length];

      ctx.translate(f.x, f.y);
      ctx.scale(f.facing * SPRITE_SCALE, SPRITE_SCALE);
      ctx.translate(-SPRITE_W / 2 + pose.lean, -SPRITE_H + pose.bob);

      const side = f === world.p1 ? "p1" : "p2";
      let frameIndex = frames.indexOf(pose);
      if ((anim === "punch" || anim === "heavy") && f.attackTotal > 0) {
        const ratio = Math.min(0.999, f.attackElapsed / f.attackTotal);
        frameIndex = Math.floor(ratio * frames.length);
      }
      const frame = spriteCache[side][anim][frameIndex] || spriteCache[side].idle[0];
      ctx.drawImage(frame, 0, 0);

      if (f.state === "skill" && f.attackTimer > 0) {
        ctx.strokeStyle = "rgba(255, 240, 170, 0.8)";
        ctx.lineWidth = 1;
        ctx.strokeRect(19, 12, 3 + pose.fArm, 8);
      }

      ctx.restore();
    }

    function drawProjectiles() {
      world.projectiles.forEach((p) => {
        const f = Math.floor(Date.now() / 70) % 3;
        const x = p.x;
        const y = p.y;
        const ring = f === 0 ? "#ff9d3b" : f === 1 ? "#ffe17b" : "#ffd14f";
        const core = f === 2 ? "#fff7bf" : "#fff2a3";

        ctx.fillStyle = ring;
        ctx.fillRect(x - 9, y - 5, 18, 10);
        ctx.fillRect(x - 5, y - 9, 10, 18);
        ctx.fillStyle = core;
        ctx.fillRect(x - 4, y - 4, 8, 8);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillRect(x + 2, y - 7, 3, 3);
      });
    }

    function render() {
      ctx.save();
      if (world.shake > 0) {
        ctx.translate((Math.random() - 0.5) * world.shake, (Math.random() - 0.5) * world.shake);
      }

      drawStage();
      drawProjectiles();
      drawFighter(world.p1);
      drawFighter(world.p2);

      if (world.hitFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${world.hitFlash * 2})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (!world.running) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "700 58px Verdana";
        ctx.fillText(world.over ? world.msg : "READY", canvas.width / 2, canvas.height / 2 - 8);
        ctx.font = "600 22px Verdana";
        ctx.fillText(world.over ? "按 R 或開始對戰" : "按下開始對戰", canvas.width / 2, canvas.height / 2 + 34);
      }

      ctx.restore();
    }

    function update(dt) {
      if (!world.running) return;

      world.timer -= dt;
      world.hitFlash = Math.max(0, world.hitFlash - dt * 2.4);
      world.shake = Math.max(0, world.shake - dt * 24);
      updatePlayer(dt);
      updateCPU(dt);
      updateProjectiles(dt);
      checkEnd();
      updateHud();
    }

    function loop(ts) {
      if (!world.last) world.last = ts;
      const dt = Math.min(0.033, (ts - world.last) / 1000);
      world.last = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    function setKey(e, down) {
      const key = e.key.toLowerCase();
      if (down && KEY_TO_CHAR[key]) {
        selectCharacter(KEY_TO_CHAR[key]);
      }
      if (key === "a") input.left = down;
      if (key === "d") input.right = down;
      if (key === "w") input.up = down;
      if (key === "s") input.down = down;
      if (key === "j") input.guard = down;
      if (key === "f" && down) input.punch = true;
      if (key === "g" && down) input.heavy = true;
      if (key === "h" && down) input.skill = true;
      if (key === "r" && down) resetGame();
    }

    startBtn.addEventListener("click", resetGame);
    charButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectCharacter(btn.dataset.char);
      });
    });
    document.addEventListener("keydown", (e) => {
      if (!audioReady) initAudio();
      setKey(e, true);
    });
    document.addEventListener("keyup", (e) => setKey(e, false));

    buildSpriteCache();
    updateCharacterUI();
    resetGame();
    world.running = false;
    world.msg = "按 開始對戰";
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
