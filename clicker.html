<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Master - 點擊大師</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #2c3e50;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
      user-select: none;
    }
    #game-container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    #click-area {
      width: 250px;
      height: 250px;
      background-color: #e74c3c;
      border-radius: 50%;
      margin: 30px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.1s;
    }
    #click-area:active {
      transform: scale(0.95);
    }
    .stats {
      font-size: 1.5em;
      margin: 10px 0;
    }
    .timer-bar {
      width: 100%;
      height: 10px;
      background-color: #34495e;
      border-radius: 5px;
      margin-top: 20px;
      overflow: hidden;
    }
    #progress {
      width: 100%;
      height: 100%;
      background-color: #2ecc71;
      transition: width 0.1s linear;
    }
    .btn {
      padding: 10px 25px;
      font-size: 18px;
      background-color: #3498db;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="game-container">
  <h1>點擊大師</h1>
  <div class="stats">分數: <span id="scoreText">0</span></div>
  <div id="click-area">GO!</div>
  <div class="timer-bar"><div id="progress"></div></div>
  <p id="hint">在時間結束前，盡快點擊！</p>
  <button class="btn" id="restartBtn" style="display: none;">重新挑戰</button>
</div>

<script>
  let score = 0;
  let timeLeft = 10; // 初始時間 10 秒
  let isPlaying = false;
  let timerInterval = null;

  const clickArea = document.getElementById('click-area');
  const scoreText = document.getElementById('scoreText');
  const progress = document.getElementById('progress');
  const restartBtn = document.getElementById('restartBtn');

  function startGame() {
    score = 0;
    timeLeft = 10;
    isPlaying = true;
    scoreText.textContent = score;
    clickArea.textContent = "GO!";
    clickArea.style.backgroundColor = "#e74c3c";
    restartBtn.style.display = "none";
    
    startTimer();
  }

  function startTimer() {
    clearInterval(timerInterval);
    updateProgress();
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        endGame();
      } else {
        updateProgress();
      }
    }, 100);
  }

  function updateProgress() {
    const percentage = (timeLeft / 10) * 100;
    progress.style.width = percentage + "%";
  }

  function endGame() {
    isPlaying = false;
    clearInterval(timerInterval);
    clickArea.textContent = "END";
    clickArea.style.backgroundColor = "#2c3e50";
    restartBtn.style.display = "inline-block";
    alert("時間到！您的最終分數是: " + score);
  }

  clickArea.addEventListener('mousedown', () => {
    if (!isPlaying) {
      startGame();
      return;
    }
    
    score++;
    scoreText.textContent = score;
    
    // Visual feedback: Randomly change color slightly
    const hueShift = Math.floor(Math.random() * 40) - 20;
    clickArea.style.backgroundColor = `hsl(0, 70%, ${50 + hueShift}%)`;
  });

  restartBtn.addEventListener('click', () => {
    startGame();
  });
</script>

</body>
</html>
