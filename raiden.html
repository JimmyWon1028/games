<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiden Remastered</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at 20% 10%, #17304a 0%, #0b111d 38%, #070b13 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(75, 180, 255, 0.25);
            border: 2px solid rgba(120, 180, 230, 0.45);
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
        }
        canvas {
            display: block;
            background-color: #000;
        }
        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            pointer-events: none;
            color: #fff;
            display: flex;
            justify-content: space-between;
            text-shadow: 2px 2px 4px #000;
        }
        .stats-box {
            font-size: 18px;
            background: rgba(7, 17, 32, 0.62);
            border: 1px solid rgba(124, 196, 255, 0.45);
            box-shadow: inset 0 0 15px rgba(30, 110, 180, 0.35);
            padding: 6px 16px;
            border-radius: 20px;
            color: #d7f4ff;
            letter-spacing: 0.4px;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(2, 10, 20, 0.78), rgba(3, 6, 14, 0.9));
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        #start-screen h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #78d8ff;
            letter-spacing: 6px;
            text-shadow: 0 0 22px rgba(122, 224, 255, 0.85);
        }
        .btn {
            padding: 12px 40px;
            font-size: 20px;
            cursor: pointer;
            background: linear-gradient(180deg, #66d4ff, #2a85d8);
            color: white;
            border: none;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(32, 150, 255, 0.35);
            transition: transform 0.2s, filter 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.08);
        }
        .controls-hint {
            margin-top: 30px;
            font-size: 14px;
            color: #a7d3e8;
            text-align: center;
            line-height: 1.6;
        }
        .boss-alert {
            position: absolute;
            top: 46%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            padding: 10px 22px;
            border: 1px solid rgba(255, 120, 120, 0.75);
            border-radius: 999px;
            background: rgba(120, 0, 20, 0.35);
            color: #ffd9d9;
            font-size: 22px;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(255, 110, 110, 0.8);
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.45);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .boss-alert.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-overlay">
        <div class="stats-box">Score: <span id="scoreText">0</span></div>
        <div class="stats-box">Lives: <span id="livesText">3</span></div>
    </div>
    <div id="start-screen">
        <h1>RAIDEN</h1>
        <button class="btn" id="startBtn">START MISSION</button>
        <div class="controls-hint">
            WASD / Arrow Keys to Move<br>
            Space / Click to Shoot
        </div>
    </div>
    <div id="bossAlert" class="boss-alert">WARNING - BOSS APPROACHING</div>
</div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('scoreText');
const livesText = document.getElementById('livesText');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('startBtn');
const bossAlert = document.getElementById('bossAlert');

// Game Constants
const WIDTH = 400;
const HEIGHT = 600;
canvas.width = WIDTH;
canvas.height = HEIGHT;

const PLAYER_SIZE = 30;
const BULLET_SPEED = 7;
const ENEMY_MIN_SPEED = 1.5;
const ENEMY_MAX_SPEED = 3;

// Game State
let gameState = 'START'; // START, PLAYING, GAMEOVER
let score = 0;
let lives = 3;
let lastTime = 0;
let spawnTimer = 0;
let shakeAmount = 0;
let bossActive = false;
let bossWarningTimer = 0;
let hitFlashTimer = 0;
let timeScale = 1;
let nextBossScore = 3000;

// Entities
let player = { x: WIDTH / 2, y: HEIGHT - 60, vx: 0, vy: 0, speed: 5, weaponLevel: 1 };
let bullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let powerups = [];
let boss = null;
let stars = Array.from({ length: 70 }, () => ({
    x: Math.random() * WIDTH,
    y: Math.random() * HEIGHT,
    size: 0.6 + Math.random() * 2,
    speed: 0.5 + Math.random() * 1.8,
    alpha: 0.3 + Math.random() * 0.6,
    twinkle: Math.random() * Math.PI * 2
}));

// Input Handling
const keys = {};
window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

// Audio Context setup
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, type, duration, volume = 0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.connect(audioCtx.destination);
    osc.connect(gain);
    gain.connect(audioCtx.destination); // double connection is fine if gain is controlled
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// Particle System for explosions and effects
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.life = 1.0;
        this.decay = 0.02 + Math.random() * 0.02;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 3, 3);
        ctx.globalAlpha = 1.0;
    }
}

function createExplosion(x, y, color, count = 15) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
    shakeAmount = 5;
}

// Game Logic Functions
function resetGame() {
    score = 0;
    lives = 3;
    player.x = WIDTH / 2;
    player.y = HEIGHT - 60;
    player.weaponLevel = 1;
    bullets = [];
    enemyBullets = [];
    enemies = [];
    powerups = [];
    particles = [];
    boss = null;
    bossActive = false;
    bossWarningTimer = 0;
    hitFlashTimer = 0;
    timeScale = 1;
    nextBossScore = 3000;
    bossAlert.classList.remove('show');
    scoreText.textContent = '0';
    livesText.textContent = '3';
    gameState = 'PLAYING';
}

function shoot() {
    if (player.weaponLevel === 1) {
        bullets.push({ x: player.x, y: player.y - 15, vy: -BULLET_SPEED, size: 4 });
    } else if (player.weaponLevel === 2) {
        bullets.push({ x: player.x - 10, y: player.y - 15, vy: -BULLET_SPEED, size: 4 });
        bullets.push({ x: player.x + 10, y: player.y - 15, vy: -BULLET_SPEED, size: 4 });
    } else {
        bullets.push({ x: player.x, y: player.y - 15, vy: -BULLET_SPEED, size: 6 });
        bullets.push({ x: player.x - 15, y: player.y - 10, vy: -BULLET_SPEED, size: 4 });
        bullets.push({ x: player.x + 15, y: player.y - 10, vy: -BULLET_SPEED, size: 4 });
    }
    playSound(440, 'square', 0.1, 0.05);
}

let lastShotTime = 0;
const shotDelay = 200; // ms

function update(dt) {
    if (gameState !== 'PLAYING') return;

    if (hitFlashTimer > 0) {
        hitFlashTimer -= dt;
    }

    timeScale += (1 - timeScale) * 0.15;
    const scaledDt = dt * timeScale;
    const dtRatio = Math.max(0.4, Math.min(1.8, scaledDt / 16.67));

    if (!bossActive && !boss && score >= nextBossScore) {
        triggerBossWarning();
    }

    if (bossWarningTimer > 0) {
        bossWarningTimer -= dt;
        if (bossWarningTimer <= 0 && !boss) {
            spawnBoss();
        }
    }

    // Player Movement
    let speed = player.speed;
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += speed;
    
    // Constrain Player
    player.x = Math.max(20, Math.min(WIDTH - 20, player.x));
    player.y = Math.max(20, Math.min(HEIGHT - 20, player.y));

    // Shooting
    const now = Date.now();
    if (keys['Space'] && now - lastShotTime > shotDelay) {
        shoot();
        lastShotTime = now;
    }

    // Starfield Update
    stars.forEach(s => {
        s.y += s.speed * dtRatio;
        s.twinkle += 0.03;
        if (s.y > HEIGHT) {
            s.y = 0;
            s.x = Math.random() * WIDTH;
        }
    });

    // Update Bullets (Player)
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y += bullets[i].vy * dtRatio;
        if (bullets[i].y < -20) bullets.splice(i, 1);
    }

    // Update Enemy Bullets
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        bullet.x += (bullet.vx || 0) * dtRatio;
        bullet.y += (bullet.vy || 4) * dtRatio;
        if (enemyBullets[i].y > HEIGHT) enemyBullets.splice(i, 1);
        else {
            // Collision with player
            const dist = Math.hypot(enemyBullets[i].x - player.x, enemyBullets[i].y - player.y);
            if (dist < 20) {
                enemyBullets.splice(i, 1);
                handlePlayerHit();
                    }
        }
    }

    // Update Enemies
    if (!bossActive && Math.random() < 0.02) { // Spawn chance per frame
        enemies.push({
            x: Math.random() * (WIDTH - 40) + 20,
            y: -30,
            speed: ENEMY_MIN_SPEED + Math.random() * (ENEMY_MAX_SPEED - ENEMY_MIN_SPEED),
            hp: 2 + Math.floor(score / 1000),
            type: Math.random() > 0.8 ? 'shooter' : 'runner',
            color: '#ff4757'
        });
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed * dtRatio;

        // Enemy Shooting logic
        if (e.type === 'shooter' && Math.random() < 0.01) {
            enemyBullets.push({ x: e.x, y: e.y, vy: 4 });
        }

        // Collision with player
        const distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
        if (distToPlayer < 30) {
            enemies.splice(i, 1);
            handlePlayerHit();
        } else if (e.y > HEIGHT) {
            enemies.splice(i, 1);
        } else {
            // Bullet vs Enemy Collision
            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                if (Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {
                    e.hp--;
                    bullets.splice(j, 1);
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, e.color);
                        score += 100;
                        // Drop powerup chance
                        if (Math.random() < 0.15) {
                            powerups.push({ x: e.x, y: e.y, type: 'WEAPON', speed: 2 });
                        }
                        enemies.splice(i, 1);
                    }
                    break;
                }
            }
        }
    }

    // Boss Update
    if (boss) {
        boss.y += (boss.targetY - boss.y) * 0.03 * dtRatio;
        boss.x += Math.sin(Date.now() / 500) * 0.8 * dtRatio;
        boss.shootTimer -= dt;

        if (boss.shootTimer <= 0) {
            const angles = [-0.32, -0.16, 0, 0.16, 0.32];
            angles.forEach((a) => {
                enemyBullets.push({
                    x: boss.x,
                    y: boss.y + 30,
                    vx: Math.sin(a) * 3.2,
                    vy: Math.cos(a) * 4.4
                });
            });
            boss.shootTimer = 700;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.abs(b.x - boss.x) < 42 && Math.abs(b.y - boss.y) < 32) {
                bullets.splice(j, 1);
                boss.hp -= 1;
                createExplosion(b.x, b.y, '#7de3ff', 4);
                if (boss.hp <= 0) {
                    createExplosion(boss.x, boss.y, '#ff7ea4', 65);
                    score += 3000;
                    boss = null;
                    bossActive = false;
                    nextBossScore += 4000;
                    break;
                }
            }
        }

        if (boss && Math.hypot(boss.x - player.x, boss.y - player.y) < 50) {
            handlePlayerHit();
        }
    }

    // Update Powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.speed * dtRatio;
        if (p.y > HEIGHT) powerups.splice(i, 1);
        else {
            const dist = Math.hypot(p.x - player.x, p.y - player.y);
            if (dist < 30) {
                player.weaponLevel = Math.min(player.weaponLevel + 1, 3);
                powerups.splice(i, 1);
                playSound(600, 'sine', 0.2, 0.1);
            }
        }
    }

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // Update UI
    scoreText.textContent = score;
}

function handlePlayerHit() {
    lives--;
    livesText.textContent = lives;
    createExplosion(player.x, player.y, '#fff', 20);
    playSound(150, 'sawtooth', 0.3, 0.2);
    shakeAmount = 15;
    hitFlashTimer = 7;
    timeScale = 0.35;

    if (lives <= 0) {
        gameOver();
    } else {
        // Respawn/Invulnerability window (simplified)
        player.x = WIDTH / 2;
        player.y = HEIGHT - 60;
    }
}

function gameOver() {
    gameState = 'GAMEOVER';
    playSound(100, 'sawtooth', 1, 0.2);
    startScreen.style.display = 'flex';
    document.querySelector('h1').textContent = 'MISSION FAILED';
    startBtn.textContent = 'RETRY';
}

function draw() {
    // Screen Shake
    ctx.save();
    if (shakeAmount > 0) {
        const dx = (Math.random() - 0.5) * shakeAmount;
        const dy = (Math.random() - 0.5) * shakeAmount;
        ctx.translate(dx, dy);
        shakeAmount *= 0.9; // Dampen shake
    }

    drawSpaceBackground();
    drawStars();

    if (boss) {
        drawBossShip(boss);
        drawBossHpBar();
    }

    // Draw Particles
    particles.forEach(p => p.draw());

    drawPowerups();

    enemies.forEach(drawEnemyShip);

    drawEnemyBullets();

    drawPlayerBullets();

    // Draw Player
    drawPlayerShip();

    if (hitFlashTimer > 0) {
        ctx.fillStyle = 'rgba(180, 230, 255, 0.14)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }

    ctx.restore(); // End Screen Shake
}

function drawSpaceBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
    sky.addColorStop(0, '#050c1d');
    sky.addColorStop(0.5, '#09122a');
    sky.addColorStop(1, '#030812');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    const nebula = ctx.createRadialGradient(WIDTH * 0.8, HEIGHT * 0.15, 30, WIDTH * 0.8, HEIGHT * 0.15, 260);
    nebula.addColorStop(0, 'rgba(64, 144, 255, 0.25)');
    nebula.addColorStop(1, 'rgba(64, 144, 255, 0)');
    ctx.fillStyle = nebula;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    const haze = ctx.createRadialGradient(WIDTH * 0.2, HEIGHT * 0.35, 20, WIDTH * 0.2, HEIGHT * 0.35, 240);
    haze.addColorStop(0, 'rgba(168, 98, 255, 0.12)');
    haze.addColorStop(1, 'rgba(168, 98, 255, 0)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
}

function drawStars() {
    stars.forEach(s => {
        const pulse = 0.6 + Math.sin(s.twinkle) * 0.4;
        ctx.globalAlpha = s.alpha * pulse;
        ctx.fillStyle = '#e8f5ff';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;
}

function drawPowerups() {
    powerups.forEach(p => {
        const pulse = 0.75 + Math.sin((Date.now() / 180) + p.x) * 0.25;
        ctx.save();
        ctx.shadowBlur = 18;
        ctx.shadowColor = 'rgba(255, 216, 86, 0.8)';
        const rg = ctx.createRadialGradient(p.x - 2, p.y - 2, 2, p.x, p.y, 11);
        rg.addColorStop(0, '#fff8c2');
        rg.addColorStop(1, '#ffb400');
        ctx.globalAlpha = pulse;
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 1.3;
        ctx.stroke();
        ctx.restore();
    });
}

function drawEnemyShip(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    const body = ctx.createLinearGradient(0, -13, 0, 15);
    body.addColorStop(0, '#ff9b9b');
    body.addColorStop(0.5, '#ff5a5a');
    body.addColorStop(1, '#8f1d2e');
    ctx.fillStyle = body;
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(255, 96, 136, 0.5)';
    ctx.beginPath();
    ctx.moveTo(0, 16);
    ctx.lineTo(-15, -10);
    ctx.lineTo(0, -3);
    ctx.lineTo(15, -10);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffe9ef';
    ctx.fillRect(-2, -8, 4, 8);
    ctx.fillStyle = '#351420';
    ctx.fillRect(-8, -2, 16, 3);
    ctx.restore();
}

function drawEnemyBullets() {
    enemyBullets.forEach(b => {
        ctx.save();
        ctx.fillStyle = '#ff6d7a';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(255, 80, 110, 0.9)';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4.2, 0, Math.PI * 2);
        ctx.fill();
        if (b.vx) {
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = '#ff97a5';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x - b.vx * 2.2, b.y - b.vy * 2.2);
            ctx.stroke();
        }
        ctx.restore();
    });
}

function drawPlayerBullets() {
    bullets.forEach(b => {
        ctx.save();
        const grad = ctx.createLinearGradient(b.x, b.y - 12, b.x, b.y + 2);
        grad.addColorStop(0, '#e8fdff');
        grad.addColorStop(1, '#45d6ff');
        ctx.strokeStyle = grad;
        ctx.lineWidth = Math.max(2, b.size);
        ctx.shadowBlur = 16;
        ctx.shadowColor = 'rgba(69, 214, 255, 0.9)';
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 2);
        ctx.lineTo(b.x, b.y - 12);
        ctx.stroke();
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#9cefff';
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 8);
        ctx.lineTo(b.x, b.y - 16);
        ctx.stroke();
        ctx.restore();
    });
}

function triggerBossWarning() {
    bossWarningTimer = 2200;
    bossActive = true;
    bossAlert.classList.add('show');
    setTimeout(() => {
        if (bossWarningTimer > 0) {
            bossAlert.classList.remove('show');
        }
    }, 1800);
}

function spawnBoss() {
    bossAlert.classList.remove('show');
    boss = {
        x: WIDTH / 2,
        y: -80,
        targetY: 90,
        hp: 140,
        hpMax: 140,
        shootTimer: 380
    };
}

function drawBossShip(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.shadowBlur = 18;
    ctx.shadowColor = 'rgba(255, 96, 140, 0.55)';
    const grad = ctx.createLinearGradient(0, -30, 0, 35);
    grad.addColorStop(0, '#ffd9ea');
    grad.addColorStop(0.4, '#ff7aa2');
    grad.addColorStop(1, '#5f1f3f');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, 34);
    ctx.lineTo(-54, -6);
    ctx.lineTo(-26, -26);
    ctx.lineTo(0, -14);
    ctx.lineTo(26, -26);
    ctx.lineTo(54, -6);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#2d1230';
    ctx.fillRect(-42, -4, 84, 9);
    ctx.fillStyle = '#ffd6e7';
    ctx.fillRect(-8, -16, 16, 12);
    ctx.restore();
}

function drawBossHpBar() {
    if (!boss) return;
    const x = 34;
    const y = 52;
    const w = WIDTH - 68;
    const ratio = Math.max(0, boss.hp / boss.hpMax);
    ctx.save();
    ctx.fillStyle = 'rgba(8, 15, 34, 0.7)';
    ctx.fillRect(x, y, w, 14);
    const hpGrad = ctx.createLinearGradient(x, y, x + w, y);
    hpGrad.addColorStop(0, '#ff9bb8');
    hpGrad.addColorStop(1, '#ff315f');
    ctx.fillStyle = hpGrad;
    ctx.fillRect(x, y, w * ratio, 14);
    ctx.strokeStyle = 'rgba(255, 200, 220, 0.9)';
    ctx.strokeRect(x, y, w, 14);
    ctx.fillStyle = '#ffdbe7';
    ctx.font = '12px Segoe UI';
    ctx.fillText('BOSS', x, y - 6);
    ctx.restore();
}

function drawPlayerShip() {
    ctx.save();
    ctx.translate(player.x, player.y);

    ctx.shadowBlur = 20;
    ctx.shadowColor = 'rgba(86, 227, 255, 0.75)';

    const hull = ctx.createLinearGradient(0, -20, 0, 15);
    hull.addColorStop(0, '#ebfbff');
    hull.addColorStop(0.45, '#85dfff');
    hull.addColorStop(1, '#1770b3');
    ctx.fillStyle = hull;
    ctx.beginPath();
    ctx.moveTo(0, -23);
    ctx.lineTo(-16, 14);
    ctx.lineTo(-5, 10);
    ctx.lineTo(0, 4);
    ctx.lineTo(5, 10);
    ctx.lineTo(16, 14);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    const wing = ctx.createLinearGradient(-14, 0, 14, 0);
    wing.addColorStop(0, '#4bb8f1');
    wing.addColorStop(0.5, '#d9f6ff');
    wing.addColorStop(1, '#4bb8f1');
    ctx.fillStyle = wing;
    ctx.fillRect(-17, 10, 34, 5);

    ctx.fillStyle = '#14263d';
    ctx.fillRect(-4, -9, 8, 12);
    ctx.fillStyle = '#a9e8ff';
    ctx.fillRect(-2, -8, 4, 8);

    const enginePulse = 6 + Math.sin(Date.now() / 70) * 2.5;
    const flame = ctx.createLinearGradient(0, 6, 0, 24);
    flame.addColorStop(0, 'rgba(186, 245, 255, 0.95)');
    flame.addColorStop(0.5, 'rgba(60, 201, 255, 0.95)');
    flame.addColorStop(1, 'rgba(43, 107, 233, 0)');
    ctx.fillStyle = flame;
    ctx.beginPath();
    ctx.moveTo(-5, 10);
    ctx.lineTo(0, 10 + enginePulse + 8);
    ctx.lineTo(5, 10);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function gameLoop(time) {
    const dt = time - lastTime;
    lastTime = time;

    update(dt);
    draw();

    requestAnimationFrame(gameLoop);
}

// Event Listeners for UI
startBtn.addEventListener('click', () => {
    initAudio();
    resetGame();
    startScreen.style.display = 'none';
});

// Start the loop immediately but idle in START state
requestAnimationFrame(gameLoop);

</script>
