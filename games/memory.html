<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆翻牌 豪华版</title>
  <style>
    :root {
      --bg-1: #09121f;
      --bg-2: #112844;
      --panel: rgba(14, 27, 44, 0.78);
      --line: rgba(124, 183, 255, 0.35);
      --text: #eef6ff;
      --sub: #9db8de;
      --brand: #53d2ff;
      --brand-2: #63f0d1;
      --ok: #61f2b1;
      --warn: #ffb871;
      --danger: #ff8fa9;
      --shadow: 0 22px 45px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 16%, rgba(71, 127, 201, 0.35) 0%, transparent 34%),
        radial-gradient(circle at 86% 8%, rgba(57, 112, 209, 0.35) 0%, transparent 36%),
        radial-gradient(circle at 50% 92%, rgba(38, 166, 170, 0.23) 0%, transparent 40%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 280px minmax(280px, 1fr) 240px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
      padding: 14px;
    }

    .left {
      display: grid;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 0;
      color: var(--sub);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .metrics {
      display: grid;
      gap: 8px;
      margin-top: 6px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(8, 18, 31, 0.72);
      border: 1px solid rgba(130, 179, 255, 0.22);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    .metric b {
      font-size: 1rem;
      color: #d6eaff;
    }

    .progress-wrap {
      margin-top: 4px;
      display: grid;
      gap: 6px;
    }

    .progress-label {
      font-size: 0.82rem;
      color: var(--sub);
      display: flex;
      justify-content: space-between;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(7, 14, 23, 0.82);
      border: 1px solid rgba(129, 181, 255, 0.2);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      transition: width 220ms ease;
    }

    .board-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    #gameCanvas {
      width: min(100%, 520px);
      height: auto;
      border-radius: 14px;
      border: 2px solid rgba(140, 196, 255, 0.55);
      background: #061022;
      box-shadow: inset 0 0 18px rgba(31, 91, 155, 0.42), 0 16px 34px rgba(0, 0, 0, 0.45);
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      background: rgba(4, 10, 18, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .overlay.show {
      opacity: 1;
      transform: scale(1);
    }

    .overlay p {
      margin: 0;
      line-height: 1.7;
      color: #eff7ff;
    }

    .right {
      display: grid;
      gap: 10px;
    }

    .mode-grid {
      display: grid;
      gap: 8px;
    }

    .mode-btn,
    button.action {
      width: 100%;
      border: 1px solid rgba(130, 180, 255, 0.33);
      border-radius: 10px;
      background: rgba(14, 30, 50, 0.82);
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px;
      cursor: pointer;
      transition: 180ms ease;
    }

    .mode-btn:hover,
    button.action:hover {
      transform: translateY(-1px);
      background: rgba(23, 45, 72, 0.95);
      border-color: rgba(113, 223, 255, 0.55);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, rgba(77, 173, 255, 0.28), rgba(89, 237, 206, 0.2));
      border-color: rgba(114, 219, 255, 0.74);
    }

    #startButton {
      background: linear-gradient(135deg, #29adff, #38d7d0);
      border: 0;
      color: #f6fdff;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    #hintButton { border-color: rgba(255, 194, 127, 0.5); }
    #soundButton { border-color: rgba(170, 195, 230, 0.5); }

    .tips {
      font-size: 0.82rem;
      color: var(--sub);
      line-height: 1.55;
      margin: 0;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: minmax(280px, 1fr) minmax(220px, 240px);
      }
      .left {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .app { grid-template-columns: 1fr; }
      .panel { padding: 12px; }
      #gameCanvas { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel left">
      <h1 class="title">记忆翻牌 · 豪华版</h1>
      <p class="subtitle">增加难度模式、连击加成、最佳成绩、本局进度、提示功能与背景音效。</p>

      <div class="metrics">
        <div class="metric"><span>得分</span><b id="score">0</b></div>
        <div class="metric"><span>时间</span><b id="timer">0s</b></div>
        <div class="metric"><span>连击</span><b id="combo">0</b></div>
        <div class="metric"><span>最佳(当前难度)</span><b id="best">0</b></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label"><span>配对进度</span><span id="progressText">0 / 0</span></div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </section>

    <section class="panel board-panel">
      <canvas id="gameCanvas" width="600" height="600" aria-label="记忆翻牌主画布"></canvas>
      <div class="overlay show" id="overlay"><p id="overlayText">选择难度后点击“开始游戏”</p></div>
    </section>

    <section class="panel right">
      <div class="mode-grid" id="modeGrid">
        <button class="mode-btn active" data-mode="easy">轻松 4x4</button>
        <button class="mode-btn" data-mode="normal">标准 4x5</button>
        <button class="mode-btn" data-mode="hard">困难 6x6</button>
      </div>

      <button class="action" id="startButton">开始游戏</button>
      <button class="action" id="hintButton">提示(剩余 3)</button>
      <button class="action" id="soundButton">音效+BGM：开</button>

      <p class="tips">玩法：翻开两张相同图案即可配对。连续配对会累积连击分，错误会中断连击。提示会短暂揭示全图。</p>
    </section>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const timerEl = document.getElementById("timer");
    const comboEl = document.getElementById("combo");
    const bestEl = document.getElementById("best");
    const progressEl = document.getElementById("progressText");
    const progressBarEl = document.getElementById("progressBar");

    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");

    const startButton = document.getElementById("startButton");
    const hintButton = document.getElementById("hintButton");
    const soundButton = document.getElementById("soundButton");
    const modeButtons = Array.from(document.querySelectorAll(".mode-btn"));

    const EMOJIS = ["🍎", "🍌", "🍇", "🍊", "🍓", "🍉", "🥝", "🍍", "🍒", "🥥", "🍑", "🫐", "🍋", "🥕", "🍆", "🌽", "🍄", "🍪"];

    const MODES = {
      easy: { cols: 4, rows: 4, card: 126, gap: 12, hints: 3, base: 100 },
      normal: { cols: 4, rows: 5, card: 108, gap: 10, hints: 2, base: 120 },
      hard: { cols: 6, rows: 6, card: 86, gap: 8, hints: 1, base: 150 }
    };

    let mode = "easy";
    let cards = [];
    let flipped = [];
    let matchedPairs = 0;
    let totalPairs = 0;

    let score = 0;
    let combo = 0;
    let running = false;
    let busy = false;
    let startTime = 0;
    let timerId = null;
    let hintsLeft = 0;

    let cardSize = 120;
    let cardGap = 10;
    let offsetX = 0;
    let offsetY = 0;
    let cols = 4;
    let rows = 4;

    let audioCtx = null;
    let soundEnabled = true;
    let bgmTimer = null;
    let bgmPlaying = false;
    let bgmIndex = 0;

    const BGM = [
      { f: 392, d: 0.19 }, { f: 330, d: 0.19 }, { f: 349, d: 0.19 }, { f: 294, d: 0.19 },
      { f: 262, d: 0.24 }, { f: 294, d: 0.19 }, { f: 330, d: 0.24 }, { f: 349, d: 0.19 }
    ];

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function beep(freq, duration, type = "sine", gainV = 0.05) {
      if (!soundEnabled) return;
      ensureAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(gainV, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playSound(type) {
      if (!soundEnabled) return;
      if (type === "flip") beep(510, 0.12, "triangle", 0.06);
      else if (type === "match") {
        beep(660, 0.1, "sine", 0.07);
        setTimeout(() => beep(880, 0.11, "sine", 0.06), 55);
      } else if (type === "wrong") beep(180, 0.18, "sawtooth", 0.06);
      else if (type === "start") {
        beep(440, 0.09, "triangle", 0.07);
        setTimeout(() => beep(550, 0.09, "triangle", 0.06), 70);
      } else if (type === "hint") beep(760, 0.12, "sine", 0.07);
      else if (type === "win") {
        beep(523, 0.1, "sine", 0.07);
        setTimeout(() => beep(659, 0.11, "sine", 0.07), 70);
        setTimeout(() => beep(784, 0.12, "sine", 0.07), 140);
      }
    }

    function bgmStep() {
      if (!bgmPlaying || !running || !soundEnabled) return;
      const n = BGM[bgmIndex];
      bgmIndex = (bgmIndex + 1) % BGM.length;
      ensureAudio();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(n.f, now);
      gain.gain.setValueAtTime(0.018, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + n.d);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + n.d);
      bgmTimer = setTimeout(bgmStep, n.d * 1000);
    }

    function startBgm() {
      if (!soundEnabled || !running || bgmPlaying) return;
      bgmPlaying = true;
      bgmStep();
    }

    function stopBgm() {
      bgmPlaying = false;
      if (bgmTimer) {
        clearTimeout(bgmTimer);
        bgmTimer = null;
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function setupBoardSize() {
      const m = MODES[mode];
      cols = m.cols;
      rows = m.rows;
      cardSize = m.card;
      cardGap = m.gap;

      const boardW = cols * cardSize + (cols - 1) * cardGap;
      const boardH = rows * cardSize + (rows - 1) * cardGap;
      offsetX = (canvas.width - boardW) / 2;
      offsetY = (canvas.height - boardH) / 2;
    }

    function initCards() {
      setupBoardSize();
      cards = [];
      const pairCount = (cols * rows) / 2;
      totalPairs = pairCount;

      const selected = shuffle([...EMOJIS]).slice(0, pairCount);
      const values = shuffle([...selected, ...selected]);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          cards.push({
            x: offsetX + c * (cardSize + cardGap),
            y: offsetY + r * (cardSize + cardGap),
            emoji: values[r * cols + c],
            flipped: false,
            matched: false,
            pulse: 0
          });
        }
      }
    }

    function drawCard(card) {
      const radius = Math.max(8, Math.floor(cardSize * 0.1));
      const showFace = card.flipped || card.matched;

      drawRoundRect(card.x, card.y, cardSize, cardSize, radius);

      if (showFace) {
        const g = ctx.createLinearGradient(card.x, card.y, card.x, card.y + cardSize);
        g.addColorStop(0, card.matched ? "#1a453f" : "#f2f7ff");
        g.addColorStop(1, card.matched ? "#10372f" : "#dcecff");
        ctx.fillStyle = g;
        ctx.fill();

        ctx.strokeStyle = card.matched ? "rgba(113, 244, 182, 0.9)" : "rgba(111, 162, 255, 0.75)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.font = `${Math.floor(cardSize * 0.48)}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#0d1d33";
        ctx.fillText(card.emoji, card.x + cardSize / 2, card.y + cardSize / 2 + 2);

        if (card.matched) {
          ctx.strokeStyle = "rgba(94, 240, 175, 0.8)";
          ctx.lineWidth = 1.5;
          drawRoundRect(card.x + 4, card.y + 4, cardSize - 8, cardSize - 8, radius - 2);
          ctx.stroke();
        }
      } else {
        const g = ctx.createLinearGradient(card.x, card.y, card.x + cardSize, card.y + cardSize);
        g.addColorStop(0, "#1f4d86");
        g.addColorStop(1, "#1b2f56");
        ctx.fillStyle = g;
        ctx.fill();

        ctx.strokeStyle = "rgba(123, 181, 255, 0.65)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(197, 232, 255, 0.5)";
        ctx.font = `${Math.floor(cardSize * 0.32)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("?", card.x + cardSize / 2, card.y + cardSize / 2 + 1);
      }
    }

    function drawRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#071226");
      g.addColorStop(1, "#081830");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(70, 118, 185, 0.12)";
      for (let x = 0; x < canvas.width; x += 30) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 30) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawGame() {
      drawBackground();
      cards.forEach(drawCard);
    }

    function updateUI() {
      const elapsed = running ? Math.floor((Date.now() - startTime) / 1000) : parseInt(timerEl.textContent, 10) || 0;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      timerEl.textContent = `${elapsed}s`;
      progressEl.textContent = `${matchedPairs} / ${totalPairs}`;
      progressBarEl.style.width = `${totalPairs ? (matchedPairs / totalPairs) * 100 : 0}%`;
      hintButton.textContent = `提示(剩余 ${hintsLeft})`;

      const best = Number(localStorage.getItem(bestKey()) || 0);
      bestEl.textContent = best;
      soundButton.textContent = soundEnabled ? "音效+BGM：开" : "音效+BGM：关";
    }

    function bestKey() {
      return `memory-deluxe-best-${mode}`;
    }

    function gameTick() {
      if (!running) return;
      updateUI();
    }

    function startGame() {
      ensureAudio();
      running = true;
      busy = false;
      score = 0;
      combo = 0;
      matchedPairs = 0;
      flipped = [];
      hintsLeft = MODES[mode].hints;
      startTime = Date.now();

      initCards();
      updateUI();
      drawGame();

      overlay.classList.remove("show");
      playSound("start");
      startBgm();

      if (timerId) clearInterval(timerId);
      timerId = setInterval(gameTick, 200);
    }

    function finishGame() {
      running = false;
      busy = false;
      stopBgm();
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const timeBonus = Math.max(0, 300 - elapsed * 2);
      score += timeBonus;

      const key = bestKey();
      const best = Number(localStorage.getItem(key) || 0);
      if (score > best) localStorage.setItem(key, String(score));

      playSound("win");
      updateUI();
      drawGame();

      overlayText.innerHTML = `通关成功<br>得分 ${score}<br>用时 ${elapsed}s`;
      overlay.classList.add("show");
      startButton.textContent = "再玩一次";
    }

    function revealAll(duration = 850) {
      if (!running) return;
      cards.forEach((c) => {
        if (!c.matched) c.flipped = true;
      });
      drawGame();
      setTimeout(() => {
        if (!running) return;
        cards.forEach((c) => {
          if (!c.matched && !flipped.includes(c)) c.flipped = false;
        });
        drawGame();
      }, duration);
    }

    function checkPair() {
      if (flipped.length < 2) return;
      busy = true;
      const [a, b] = flipped;

      if (a.emoji === b.emoji) {
        a.matched = true;
        b.matched = true;
        matchedPairs += 1;
        combo += 1;
        score += MODES[mode].base + combo * 20;
        playSound("match");
        flipped = [];
        busy = false;
        updateUI();
        drawGame();

        if (matchedPairs === totalPairs) {
          setTimeout(finishGame, 380);
        }
      } else {
        combo = 0;
        score = Math.max(0, score - 25);
        playSound("wrong");
        setTimeout(() => {
          a.flipped = false;
          b.flipped = false;
          flipped = [];
          busy = false;
          updateUI();
          drawGame();
        }, 620);
      }
    }

    function hitCard(x, y) {
      for (const card of cards) {
        if (x >= card.x && x <= card.x + cardSize && y >= card.y && y <= card.y + cardSize) {
          return card;
        }
      }
      return null;
    }

    canvas.addEventListener("click", (e) => {
      if (!running || busy || flipped.length >= 2) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);

      const card = hitCard(x, y);
      if (!card || card.flipped || card.matched) return;
      card.flipped = true;
      flipped.push(card);
      playSound("flip");
      updateUI();
      drawGame();
      checkPair();
    });

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        modeButtons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        mode = btn.dataset.mode;
        startButton.textContent = "开始游戏";
        running = false;
        stopBgm();
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
        score = 0;
        combo = 0;
        matchedPairs = 0;
        hintsLeft = MODES[mode].hints;
        setupBoardSize();
        initCards();
        drawGame();
        updateUI();
        overlayText.textContent = "选择难度后点击“开始游戏”";
        overlay.classList.add("show");
      });
    });

    startButton.addEventListener("click", () => {
      startGame();
    });

    hintButton.addEventListener("click", () => {
      if (!running || busy || hintsLeft <= 0) return;
      hintsLeft -= 1;
      playSound("hint");
      revealAll(900);
      updateUI();
    });

    soundButton.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled) {
        stopBgm();
      } else if (running) {
        startBgm();
        playSound("flip");
      }
      updateUI();
    });

    function initial() {
      hintsLeft = MODES[mode].hints;
      setupBoardSize();
      initCards();
      drawGame();
      updateUI();
    }

    initial();
  </script>
</body>
</html>
