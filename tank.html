<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大戰豪華版</title>
  <style>
    :root {
      --bg: #a8adaa;
      --arena-bg: #000000;
      --brick-a: #ff5a2a;
      --brick-b: #d42f1f;
      --steel-a: #f9f9f9;
      --steel-b: #d8d8d8;
      --grass-a: #a7ff4f;
      --grass-b: #2e8c3a;
      --hud: #111111;
      --hud-accent: #ff7a27;
    }

    * {
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      font-family: "Courier New", "PingFang TC", "Microsoft JhengHei", monospace;
      padding: 10px;
    }

    .cabinet {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      border: 3px solid #8f938f;
      background: #9ea39f;
      padding: 14px;
      box-shadow: 0 0 0 2px #b8beb8 inset;
    }

    .left {
      border: 3px solid #111;
      background: #000;
      box-shadow: 0 0 0 2px #2a2a2a inset;
    }

    #gameCanvas {
      width: min(80vw, 704px);
      height: auto;
      display: block;
      background: #000;
      box-shadow: 0 0 0 1px #000 inset;
    }

    .right {
      width: 100px;
      min-height: 100%;
      color: #101010;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      padding-top: 6px;
    }

    .lives {
      display: grid;
      grid-template-columns: repeat(2, 16px);
      gap: 6px 8px;
      padding: 6px 0;
    }

    .lifeTank {
      width: 16px;
      height: 16px;
      background:
        linear-gradient(180deg, #191919 0 35%, transparent 35% 100%),
        repeating-linear-gradient(90deg, #191919 0 2px, transparent 2px 4px),
        linear-gradient(90deg, transparent 0 5px, #d72828 5px 11px, transparent 11px 100%);
      border: 1px solid #111;
    }

    .info {
      width: 100%;
      font-weight: 700;
      font-size: 34px;
      line-height: 1;
      text-align: center;
      letter-spacing: 1px;
    }

    .small {
      font-size: 15px;
      margin-top: 6px;
    }

    .flag {
      width: 56px;
      height: 40px;
      position: relative;
      margin-top: 4px;
    }

    .flag::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 4px;
      width: 6px;
      height: 32px;
      background: #111;
    }

    .flag::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 8px;
      width: 40px;
      height: 22px;
      background: #f75815;
      clip-path: polygon(0 0, 100% 35%, 0 100%);
    }

    .cta {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding-bottom: 8px;
    }

    #startButton {
      width: 100%;
      border: 2px solid #171717;
      background: #f2f2f2;
      color: #111;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      padding: 8px 6px;
      cursor: pointer;
    }

    .tip {
      font-size: 11px;
      text-align: center;
      line-height: 1.45;
      color: #1a1a1a;
    }

    @media (max-width: 860px) {
      .cabinet {
        flex-direction: column;
        align-items: center;
      }

      .right {
        width: 100%;
        min-height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      .info {
        width: auto;
        font-size: 26px;
      }

      .cta {
        margin-top: 0;
        width: auto;
      }

      #startButton {
        width: 140px;
      }
    }
  </style>
</head>
<body>
  <main class="cabinet">
    <section class="left">
      <canvas id="gameCanvas" width="704" height="704"></canvas>
    </section>

    <aside class="right">
      <div class="lives" id="livesBox"></div>

      <div class="info">
        I<br>
        <span style="color: var(--hud-accent);">x</span><span id="scoreValue">0</span>
      </div>

      <div class="flag"></div>

      <div class="info small">STAGE<br><span id="waveValue">1</span></div>

      <div class="cta">
        <button id="startButton">開始遊戲</button>
        <div class="tip">WASD / 方向鍵移動<br>空白鍵射擊，Enter 重開</div>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startButton = document.getElementById("startButton");
    const livesBox = document.getElementById("livesBox");
    const scoreValue = document.getElementById("scoreValue");
    const waveValue = document.getElementById("waveValue");

    const GRID = 26;
    const TILE = canvas.width / GRID;

    const CELL_EMPTY = 0;
    const CELL_BRICK = 1;
    const CELL_STEEL = 2;
    const CELL_GRASS = 3;
    const CELL_WATER = 4;

    const input = { up: false, down: false, left: false, right: false, shoot: false };
    const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
    const spawnPoints = [1.5, GRID / 2, GRID - 1.5];

    let raf = null;
    let audioCtx = null;

    const textures = { brick: [], steel: [], grass: [], water: [] };

    const game = {
      running: false,
      over: false,
      last: 0,
      wave: 1,
      lives: 3,
      score: 0,
      enemiesLeft: 20,
      spawned: 0,
      spawnCooldown: 0,
      map: [],
      bullets: [],
      enemyBullets: [],
      enemies: [],
      effects: [],
      player: null,
      base: { x: 12, y: 24, alive: true }
    };

    function hash01(x, y, seed = 0) {
      const v = Math.sin((x + 1.7) * 12.9898 + (y + 3.1) * 78.233 + seed * 37.719) * 43758.5453;
      return v - Math.floor(v);
    }

    function makeTexture(drawer) {
      const cv = document.createElement("canvas");
      cv.width = TILE;
      cv.height = TILE;
      const c = cv.getContext("2d");
      drawer(c);
      return cv;
    }

    function createTextures() {
      textures.brick = [0, 1].map((variant) => makeTexture((c) => {
        c.fillStyle = variant ? "#b01f12" : "#ae2114";
        c.fillRect(0, 0, TILE, TILE);
        const bw = TILE / 2;
        const bh = TILE / 3;
        for (let yy = 0; yy < 3; yy += 1) {
          for (let xx = 0; xx < 2; xx += 1) {
            const ox = xx * bw + (yy % 2 ? -bw * 0.22 : 0);
            c.fillStyle = yy % 2 ? "#ef5d31" : "#ff6d3b";
            c.fillRect(ox + 1, yy * bh + 1, bw - 2, bh - 2);
          }
        }
      }));

      textures.steel = [0, 1].map((variant) => makeTexture((c) => {
        c.fillStyle = variant ? "#dfdfdf" : "#ececec";
        c.fillRect(0, 0, TILE, TILE);
        c.strokeStyle = "#c8c8c8";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(0, TILE / 2);
        c.lineTo(TILE, TILE / 2);
        c.moveTo(TILE / 2, 0);
        c.lineTo(TILE / 2, TILE);
        c.stroke();
      }));

      textures.grass = [0, 1].map((variant) => makeTexture((c) => {
        c.fillStyle = variant ? "#2b7f36" : "#307f3c";
        c.fillRect(0, 0, TILE, TILE);
        for (let iy = 2; iy < TILE - 2; iy += 4) {
          for (let ix = 2; ix < TILE - 2; ix += 4) {
            const h = hash01(ix, iy, variant);
            c.fillStyle = h > 0.52 ? "#99db52" : "#76b842";
            c.fillRect(ix, iy, 2, 2);
          }
        }
      }));

      textures.water = [0, 1].map((variant) => makeTexture((c) => {
        c.fillStyle = variant ? "#2d65bd" : "#355eb6";
        c.fillRect(0, 0, TILE, TILE);
        for (let y = 2; y < TILE; y += 6) {
          c.fillStyle = "#6ba2ff";
          c.fillRect(2, y, TILE - 4, 2);
        }
      }));
    }

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function beep(type, f, d, v) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const now = audioCtx.currentTime;
      o.type = type;
      o.frequency.setValueAtTime(f, now);
      g.gain.setValueAtTime(v, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + d);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(now);
      o.stop(now + d);
    }

    function sfx(name) {
      if (name === "shoot") beep("square", 460, 0.05, 0.08);
      if (name === "hit") beep("sawtooth", 150, 0.09, 0.1);
      if (name === "hurt") beep("triangle", 95, 0.14, 0.11);
      if (name === "start") beep("sine", 620, 0.11, 0.1);
      if (name === "gameover") beep("sawtooth", 180, 0.28, 0.13);
    }

    function makeClassicMap() {
      const coarse = [
        ".............",
        ".B..S...S..B.",
        ".B.........B.",
        "...BB...BB...",
        "..G...B...G..",
        "..G.B...B.G..",
        "..G...W...G..",
        "...BB...BB...",
        ".S....B....S.",
        ".B..S...S..B.",
        ".B.........B.",
        ".....BBB.....",
        "....B...B...."
      ];

      const map = Array.from({ length: GRID }, () => Array(GRID).fill(CELL_EMPTY));
      for (let y = 0; y < coarse.length; y += 1) {
        for (let x = 0; x < coarse[y].length; x += 1) {
          const ch = coarse[y][x];
          let cell = CELL_EMPTY;
          if (ch === "B") cell = CELL_BRICK;
          if (ch === "S") cell = CELL_STEEL;
          if (ch === "G") cell = CELL_GRASS;
          if (ch === "W") cell = CELL_WATER;
          const xx = x * 2;
          const yy = y * 2;
          map[yy][xx] = cell;
          map[yy + 1][xx] = cell;
          map[yy][xx + 1] = cell;
          map[yy + 1][xx + 1] = cell;
        }
      }

      for (let y = 21; y < GRID; y += 1) {
        for (let x = 9; x <= 16; x += 1) map[y][x] = CELL_EMPTY;
      }

      for (let x = 10; x <= 15; x += 1) map[22][x] = CELL_BRICK;
      map[23][10] = CELL_BRICK;
      map[23][15] = CELL_BRICK;
      map[24][10] = CELL_BRICK;
      map[24][15] = CELL_BRICK;
      map[25][10] = CELL_BRICK;
      map[25][11] = CELL_BRICK;
      map[25][14] = CELL_BRICK;
      map[25][15] = CELL_BRICK;

      return map;
    }

    function getPlayerSpawn() {
      const candidates = [
        { x: 4, y: GRID - 3 },
        { x: GRID - 4, y: GRID - 3 },
        { x: GRID / 2, y: GRID - 6 }
      ];

      for (const pos of candidates) {
        if (canWalk(pos.x, pos.y)) return pos;
      }
      return { x: GRID / 2, y: GRID - 6 };
    }

    function resetPlayer() {
      const spawn = getPlayerSpawn();
      game.player = {
        x: spawn.x,
        y: spawn.y,
        dir: 0,
        angle: -Math.PI / 2,
        speed: 5.8,
        reload: 0,
        inv: 1.4
      };
    }

    function resetStage() {
      game.running = true;
      game.over = false;
      game.last = 0;
      game.spawnCooldown = 0;
      game.spawned = 0;
      game.enemiesLeft = 20;
      game.base.alive = true;
      game.map = makeClassicMap();
      game.bullets = [];
      game.enemyBullets = [];
      game.enemies = [];
      game.effects = [];
      resetPlayer();
      syncHud();
    }

    function startNewGame() {
      game.wave = 1;
      game.lives = 2;
      game.score = 0;
      resetStage();
      startButton.textContent = "重新開始";
    }

    function syncHud() {
      scoreValue.textContent = game.lives;
      waveValue.textContent = game.wave;

      const enemyRemain = game.enemiesLeft + game.enemies.length;
      livesBox.innerHTML = "";
      for (let i = 0; i < enemyRemain; i += 1) {
        const d = document.createElement("div");
        d.className = "lifeTank";
        livesBox.appendChild(d);
      }
    }

    function inMap(x, y) {
      return x >= 0 && y >= 0 && x < GRID && y < GRID;
    }

    function isBlockedCell(cell) {
      return cell === CELL_BRICK || cell === CELL_STEEL || cell === CELL_WATER;
    }

    function canWalk(x, y) {
      const checks = [
        [x - 0.35, y - 0.35],
        [x + 0.35, y - 0.35],
        [x - 0.35, y + 0.35],
        [x + 0.35, y + 0.35]
      ];

      for (const [cx, cy] of checks) {
        const tx = Math.floor(cx);
        const ty = Math.floor(cy);
        if (!inMap(tx, ty)) return false;
        if (isBlockedCell(game.map[ty][tx])) return false;
      }
      return true;
    }

    function blast(x, y, c, count) {
      for (let i = 0; i < count; i += 1) {
        const a = Math.random() * Math.PI * 2;
        const v = 1 + Math.random() * 3.2;
        game.effects.push({
          x,
          y,
          dx: Math.cos(a) * v,
          dy: Math.sin(a) * v,
          life: 0.14 + Math.random() * 0.2,
          c
        });
      }
    }

    function fire(tank, enemy) {
      const speed = enemy ? 9.2 : 10.8;
      const muzzleOffset = 0.56;
      const bullet = {
        x: tank.x + Math.cos(tank.angle) * muzzleOffset,
        y: tank.y + Math.sin(tank.angle) * muzzleOffset,
        dx: Math.cos(tank.angle) * speed,
        dy: Math.sin(tank.angle) * speed,
        life: 1.1
      };
      if (enemy) game.enemyBullets.push(bullet);
      else game.bullets.push(bullet);
      sfx("shoot");
    }

    function spawnEnemy() {
      if (game.enemies.length >= 4) return;
      if (game.enemiesLeft <= 0) return;
      game.spawnCooldown -= 1 / 60;
      if (game.spawnCooldown > 0) return;

      const sx = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
      game.enemies.push({
        x: sx,
        y: 1.5,
        dir: 2,
        angle: Math.PI / 2,
        speed: 3 + game.wave * 0.12,
        reload: 0.5 + Math.random() * 0.6,
        moveClock: 0,
        spawnInv: 1
      });
      game.enemiesLeft -= 1;
      game.spawned += 1;
      game.spawnCooldown = 0.8;
    }

    function randomDir() {
      return Math.floor(Math.random() * 4);
    }

    function movePlayer(dt) {
      const p = game.player;
      if (!p) return;

      let dx = 0;
      let dy = 0;
      if (input.up) {
        dy = -1;
        p.dir = 0;
        p.angle = -Math.PI / 2;
      } else if (input.down) {
        dy = 1;
        p.dir = 2;
        p.angle = Math.PI / 2;
      } else if (input.left) {
        dx = -1;
        p.dir = 3;
        p.angle = Math.PI;
      } else if (input.right) {
        dx = 1;
        p.dir = 1;
        p.angle = 0;
      }

      const nx = p.x + dx * p.speed * dt;
      const ny = p.y + dy * p.speed * dt;
      if (canWalk(nx, p.y)) p.x = nx;
      if (canWalk(p.x, ny)) p.y = ny;

      p.x = Math.max(0.6, Math.min(GRID - 0.6, p.x));
      p.y = Math.max(0.6, Math.min(GRID - 0.6, p.y));
      p.reload -= dt;
      p.inv -= dt;

      if (input.shoot && p.reload <= 0) {
        fire(p, false);
        p.reload = 0.25;
      }
    }

    function moveEnemies(dt) {
      game.enemies.forEach((e) => {
        e.reload -= dt;
        e.moveClock -= dt;
        e.spawnInv -= dt;

        if (e.moveClock <= 0) {
          if (Math.random() < 0.22) e.dir = randomDir();
          if (Math.random() < 0.5) {
            const px = game.player.x - e.x;
            const py = game.player.y - e.y;
            e.dir = Math.abs(px) > Math.abs(py) ? (px > 0 ? 1 : 3) : (py > 0 ? 2 : 0);
          }
          e.moveClock = 0.09 + Math.random() * 0.08;
        }

        const [dx, dy] = dirs[e.dir];
        e.angle = Math.atan2(dy, dx);
        const nx = e.x + dx * e.speed * dt;
        const ny = e.y + dy * e.speed * dt;
        if (canWalk(nx, e.y)) e.x = nx;
        else e.dir = randomDir();
        if (canWalk(e.x, ny)) e.y = ny;

        e.x = Math.max(0.6, Math.min(GRID - 0.6, e.x));
        e.y = Math.max(0.6, Math.min(GRID - 0.6, e.y));

        if (e.reload <= 0) {
          if (Math.random() < 0.75) fire(e, true);
          e.reload = 0.9 + Math.random() * 0.7;
        }
      });
    }

    function hitMap(bullet) {
      const tx = Math.floor(bullet.x);
      const ty = Math.floor(bullet.y);
      if (!inMap(tx, ty)) return true;
      const cell = game.map[ty][tx];
      if (cell === CELL_EMPTY || cell === CELL_GRASS || cell === CELL_WATER) return false;
      if (cell === CELL_BRICK) {
        game.map[ty][tx] = CELL_EMPTY;
        blast(bullet.x, bullet.y, "#ff7641", 8);
      }
      if (cell === CELL_STEEL) {
        blast(bullet.x, bullet.y, "#f1f1f1", 4);
      }
      return true;
    }

    function hitBase(bullet) {
      const bx = game.base.x;
      const by = game.base.y;
      if (bullet.x >= bx && bullet.x < bx + 2 && bullet.y >= by && bullet.y < by + 2) {
        game.base.alive = false;
        blast(bx + 1, by + 1, "#ff4d38", 24);
        return true;
      }
      return false;
    }

    function moveBullets(list, dt, enemyBullet = false) {
      for (let i = list.length - 1; i >= 0; i -= 1) {
        const b = list[i];
        b.x += b.dx * dt;
        b.y += b.dy * dt;
        b.life -= dt;

        if (b.life <= 0 || b.x < 0 || b.y < 0 || b.x > GRID || b.y > GRID) {
          list.splice(i, 1);
          continue;
        }

        if (hitMap(b) || hitBase(b)) {
          list.splice(i, 1);
          continue;
        }

        if (!enemyBullet) {
          for (let j = game.enemies.length - 1; j >= 0; j -= 1) {
            const e = game.enemies[j];
            if (e.spawnInv > 0) continue;
            if (Math.abs(b.x - e.x) < 0.56 && Math.abs(b.y - e.y) < 0.56) {
              list.splice(i, 1);
              game.enemies.splice(j, 1);
              game.score += 100;
              blast(e.x, e.y, "#ff7151", 12);
              sfx("hit");
              break;
            }
          }
        } else {
          const p = game.player;
          if (p.inv <= 0 && Math.abs(b.x - p.x) < 0.56 && Math.abs(b.y - p.y) < 0.56) {
            list.splice(i, 1);
            game.lives -= 1;
            blast(p.x, p.y, "#f8f8f8", 14);
            sfx("hurt");
            if (game.lives < 0) {
              game.over = true;
              game.running = false;
              sfx("gameover");
            } else {
              resetPlayer();
            }
          }
        }
      }
    }

    function moveEffects(dt) {
      for (let i = game.effects.length - 1; i >= 0; i -= 1) {
        const p = game.effects[i];
        p.x += p.dx * dt;
        p.y += p.dy * dt;
        p.dx *= 0.9;
        p.dy *= 0.9;
        p.life -= dt;
        if (p.life <= 0) game.effects.splice(i, 1);
      }
    }

    function checkStageClear() {
      if (game.enemiesLeft === 0 && game.enemies.length === 0) {
        game.wave += 1;
        game.score += 500;
        resetStage();
      }
    }

    function update(dt) {
      if (!game.running || game.over) return;

      spawnEnemy();
      movePlayer(dt);
      moveEnemies(dt);
      moveBullets(game.bullets, dt, false);
      moveBullets(game.enemyBullets, dt, true);
      moveEffects(dt);

      if (!game.base.alive) {
        game.over = true;
        game.running = false;
        sfx("gameover");
      }

      checkStageClear();
      syncHud();
    }

    function drawBrick(x, y) {
      const v = (x + y) % 2;
      ctx.drawImage(textures.brick[v], x * TILE, y * TILE);
    }

    function drawSteel(x, y) {
      const v = (x + y) % 2;
      ctx.drawImage(textures.steel[v], x * TILE, y * TILE);
    }

    function drawGrass(x, y) {
      const v = (x * 7 + y * 11) % 2;
      ctx.drawImage(textures.grass[v], x * TILE, y * TILE);
    }

    function drawWater(x, y) {
      const v = (x + y) % 2;
      ctx.drawImage(textures.water[v], x * TILE, y * TILE);
    }

    function drawTank(t, player = false) {
      const x = t.x * TILE;
      const y = t.y * TILE;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t.angle);

      const body = player ? "#f3df9e" : "#4dad72";
      const tower = player ? "#d2bf82" : "#357f56";

      ctx.fillStyle = body;
      ctx.fillRect(-11, -9, 22, 18);
      ctx.fillStyle = tower;
      ctx.fillRect(-5, -5, 10, 10);
      ctx.fillStyle = "#111";
      ctx.fillRect(0, -2, 14, 4);
      ctx.fillRect(12, -1, 3, 2);
      ctx.fillRect(-13, -9, 4, 18);
      ctx.fillRect(9, -9, 4, 18);

      if (!player && t.spawnInv > 0 && Math.floor(Date.now() / 90) % 2 === 0) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(-12, -10, 24, 20);
      }

      if (player && t.inv > 0 && Math.floor(Date.now() / 110) % 2 === 0) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(-12, -10, 24, 20);
      }

      ctx.restore();
    }

    function drawBullet(b, enemy) {
      ctx.fillStyle = enemy ? "#ff9b8b" : "#ffffff";
      ctx.fillRect(b.x * TILE - 2, b.y * TILE - 2, 4, 4);
    }

    function drawBase() {
      const x = game.base.x * TILE;
      const y = game.base.y * TILE;
      ctx.fillStyle = game.base.alive ? "#2f2f2f" : "#6f1c14";
      ctx.fillRect(x, y, TILE * 2, TILE * 2);
      ctx.fillStyle = game.base.alive ? "#d7d7d7" : "#ff6f3d";
      ctx.beginPath();
      ctx.moveTo(x + TILE * 0.4, y + TILE * 1.4);
      ctx.lineTo(x + TILE, y + TILE * 0.5);
      ctx.lineTo(x + TILE * 1.6, y + TILE * 1.4);
      ctx.closePath();
      ctx.fill();
    }

    function render() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GRID; y += 1) {
        for (let x = 0; x < GRID; x += 1) {
          const c = game.map[y][x];
          if (c === CELL_BRICK) drawBrick(x, y);
          if (c === CELL_STEEL) drawSteel(x, y);
          if (c === CELL_WATER) drawWater(x, y);
        }
      }

      drawBase();
      game.enemies.forEach((e) => drawTank(e, false));
      game.bullets.forEach((b) => drawBullet(b, false));
      game.enemyBullets.forEach((b) => drawBullet(b, true));
      drawTank(game.player, true);

      for (let y = 0; y < GRID; y += 1) {
        for (let x = 0; x < GRID; x += 1) {
          if (game.map[y][x] === CELL_GRASS) drawGrass(x, y);
        }
      }

      game.effects.forEach((p) => {
        ctx.fillStyle = p.c;
        ctx.globalAlpha = Math.max(0, p.life * 2.4);
        ctx.fillRect(p.x * TILE, p.y * TILE, 3, 3);
      });
      ctx.globalAlpha = 1;

      if (!game.running) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 34px Courier New";
        ctx.fillText(game.over ? "GAME OVER" : "BATTLE CITY", canvas.width / 2, canvas.height / 2 - 16);
        ctx.font = "18px Courier New";
        ctx.fillText("Press Enter", canvas.width / 2, canvas.height / 2 + 18);
      }
    }

    function loop(ts) {
      if (!game.last) game.last = ts;
      const dt = Math.min(0.032, (ts - game.last) / 1000);
      game.last = ts;
      update(dt);
      render();
      raf = requestAnimationFrame(loop);
    }

    function startGame() {
      initAudio();
      startNewGame();
      sfx("start");
    }

    function setKey(e, down) {
      const k = e.key.toLowerCase();
      if (["arrowup", "w"].includes(k)) input.up = down;
      if (["arrowdown", "s"].includes(k)) input.down = down;
      if (["arrowleft", "a"].includes(k)) input.left = down;
      if (["arrowright", "d"].includes(k)) input.right = down;
      if (k === " ") input.shoot = down;
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (!game.running || game.over)) {
        startGame();
        return;
      }
      setKey(e, true);
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
        e.preventDefault();
      }
    });

    document.addEventListener("keyup", (e) => setKey(e, false));
    startButton.addEventListener("click", startGame);

    createTextures();
    game.map = makeClassicMap();
    resetPlayer();
    syncHud();
    render();
    if (!raf) raf = requestAnimationFrame(loop);
  </script>
</body>
</html>
